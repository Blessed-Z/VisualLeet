<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>152. 乘积最大子数组 - 可视化演示</title>
    <style>
        :root {
            --primary-purple: #a855f7;
            --emerald-green: #10b981;
            --rose-red: #f43f5e;
            --amber-yellow: #f59e0b;
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --border-color: #30363d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            max-width: 800px;
            width: 100%;
            border: 1px solid var(--border-color);
        }

        h2 {
            text-align: center;
            color: var(--primary-purple);
            margin-bottom: 25px;
            font-weight: 300;
        }

        .visualization-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .nums-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .num-box {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: monospace;
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .num-box.active { border: 2px solid var(--amber-yellow); transform: scale(1.1); }

        .state-container {
            display: flex;
            justify-content: space-around;
            gap: 20px;
        }

        .state-card {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .state-label { font-size: 14px; color: #8b949e; margin-bottom: 10px; }
        .state-value { font-size: 28px; font-weight: bold; font-family: monospace; }
        .max-val { color: var(--emerald-green); }
        .min-val { color: var(--rose-red); }
        .ans-val { color: var(--amber-yellow); }

        .status-text {
            height: 60px;
            text-align: center;
            font-size: 18px;
            color: var(--amber-yellow);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: var(--primary-purple);
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }
        button:disabled { background: #30363d; cursor: not-allowed; }

        .swap-alert {
            animation: flash 0.5s ease-out;
            border-color: var(--rose-red);
        }

        @keyframes flash {
            0% { background: rgba(244, 63, 94, 0.4); }
            100% { background: rgba(0,0,0,0.2); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>152. 乘积最大子数组 (Max Product Subarray)</h2>
    
    <div class="visualization-area">
        <div class="nums-row" id="numsRow"></div>
        
        <div class="state-container">
            <div class="state-card" id="maxCard">
                <div class="state-label">当前最大乘积 (max_f)</div>
                <div class="state-value max-val" id="maxDisplay">-</div>
            </div>
            <div class="state-card" id="minCard">
                <div class="state-label">当前最小乘积 (min_f)</div>
                <div class="state-value min-val" id="minDisplay">-</div>
            </div>
            <div class="state-card">
                <div class="state-label">全局最大值 (ans)</div>
                <div class="state-value ans-val" id="ansDisplay">-</div>
            </div>
        </div>
    </div>

    <div class="status-text" id="status">点击“下一步”开始</div>

    <div class="controls">
        <button id="resetBtn">重置</button>
        <button id="nextBtn">下一步</button>
    </div>
</div>

<script>
    const nums = [2, 3, -2, 4, -1];
    let max_f = nums[0];
    let min_f = nums[0];
    let ans = nums[0];
    let i = 1;
    let step = 0; // 0: 准备更新, 1: 更新结束

    function init() {
        const numsRow = document.getElementById('numsRow');
        numsRow.innerHTML = '';
        nums.forEach((num, idx) => {
            const box = document.createElement('div');
            box.className = `num-box ${idx === 0 ? 'active' : ''}`;
            box.id = `num-${idx}`;
            box.textContent = num;
            numsRow.appendChild(box);
        });

        max_f = nums[0];
        min_f = nums[0];
        ans = nums[0];
        i = 1;
        step = 0;

        document.getElementById('maxDisplay').textContent = max_f;
        document.getElementById('minDisplay').textContent = min_f;
        document.getElementById('ansDisplay').textContent = ans;
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('status').textContent = '初始化完成，第一个数 ' + nums[0] + ' 既是最大也是最小。';
    }

    function next() {
        if (i >= nums.length) return;

        const x = nums[i];
        document.querySelectorAll('.num-box').forEach(b => b.classList.remove('active'));
        document.getElementById(`num-${i}`).classList.add('active');

        const status = document.getElementById('status');
        const maxCard = document.getElementById('maxCard');
        const minCard = document.getElementById('minCard');
        maxCard.classList.remove('swap-alert');
        minCard.classList.remove('swap-alert');

        if (step === 0) {
            if (x < 0) {
                status.textContent = `遇到负数 ${x}！准备交换最大值和最小值...`;
                maxCard.classList.add('swap-alert');
                minCard.classList.add('swap-alert');
                let temp = max_f;
                max_f = min_f;
                min_f = temp;
                step = 1;
                return;
            }
            step = 1;
            next(); // Skip to update if positive
            return;
        }

        if (step === 1) {
            max_f = Math.max(x, max_f * x);
            min_f = Math.min(x, min_f * x);
            ans = Math.max(ans, max_f);

            document.getElementById('maxDisplay').textContent = max_f;
            document.getElementById('minDisplay').textContent = min_f;
            document.getElementById('ansDisplay').textContent = ans;

            status.textContent = `更新完成。当前 max_f=${max_f}, min_f=${min_f}, ans=${ans}`;
            
            i++;
            step = 0;
            if (i >= nums.length) {
                document.getElementById('nextBtn').disabled = true;
                status.textContent = `遍历结束！最终最大乘积为: ${ans}`;
            }
        }
    }

    document.getElementById('nextBtn').addEventListener('click', next);
    document.getElementById('resetBtn').addEventListener('click', init);

    init();
</script>

</body>
</html>
