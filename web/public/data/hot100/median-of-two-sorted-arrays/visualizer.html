<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>4. 寻找两个正序数组的中位数 可视化</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --primary-purple: #9d4edd;
            --rose-red: #ff006e;
            --emerald-green: #06d6a0;
            --amber: #ffbe0b;
            --text-color: #e6edf3;
            --node-bg: #161b22;
        }

        html, body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow-x: hidden; overflow-y: auto;
        }

        body { display: flex; flex-direction: column; align-items: center; padding: 40px 0; }

        .container {
            width: 95%; max-width: 1100px;
            display: flex; flex-direction: column; gap: 20px; padding-bottom: 100px;
        }

        .status-box {
            background-color: var(--node-bg); padding: 20px; border-radius: 12px;
            border-left: 5px solid var(--primary-purple); min-height: 80px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 1.1em; box-shadow: 0 4px 15px rgba(0,0,0,0.3); line-height: 1.6;
        }

        .visualization-area {
            position: relative; height: 450px; border: 1px solid #30363d; border-radius: 20px;
            background: radial-gradient(circle at center, #1c2128 0%, #0d1117 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; overflow: visible;
        }

        .array-row { display: flex; gap: 10px; position: relative; align-items: center; }
        .row-label { position: absolute; left: -80px; font-size: 0.8em; font-weight: bold; color: #8b949e; }
        .cell {
            width: 50px; height: 50px; border-radius: 10px;
            background-color: var(--node-bg); border: 2px solid #30363d;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.1em; transition: all 0.4s;
            position: relative;
        }

        .partition-line {
            position: absolute; width: 4px; height: 100%; background: var(--amber);
            box-shadow: 0 0 15px var(--amber); z-index: 5; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-radius: 2px;
        }

        .cell.left-side { background: rgba(157, 78, 221, 0.1); border-color: var(--primary-purple); }
        .cell.right-side { background: rgba(6, 214, 160, 0.05); border-color: #30363d; }
        .cell.critical { border-color: var(--rose-red); transform: scale(1.1); z-index: 6; }
        .cell.median { border-color: var(--emerald-green); color: var(--emerald-green); box-shadow: 0 0 15px var(--emerald-green); transform: scale(1.2); }

        .zoom-controls { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 100; }
        .zoom-btn {
            width: 35px; height: 35px; border-radius: 8px; background: rgba(22, 27, 34, 0.8);
            border: 1px solid #30363d; color: var(--text-color); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }

        .controls { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        button {
            padding: 12px 35px; border-radius: 35px; border: none; cursor: pointer;
            font-weight: bold; transition: all 0.3s; font-size: 1.1em;
        }
        .btn-next { background-color: var(--emerald-green); color: #000; }
        .btn-reset { background-color: #30363d; color: var(--text-color); }
        button:disabled { opacity: 0.3; }

        .highlight-text { font-weight: bold; color: var(--amber); }
    </style>
</head>
<body>
    <div class="container">
        <h1>💂‍♂️ 寻找两个正序数组的中位数</h1>
        <div class="status-box">
            <div id="status">准备开始。寻找合并后的中位数。</div>
            <div id="sub-status" style="font-size: 0.85em; color: #8b949e; margin-top: 8px;">我们在较短的数组上执行二分查找切分点。</div>
        </div>

        <div class="visualization-area" id="viz">
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="changeZoom(1.1)">+</button>
                <button class="zoom-btn" onclick="changeZoom(0.9)">-</button>
                <button class="zoom-btn" onclick="resetZoom()">⟲</button>
            </div>

            <div style="position: relative; display: flex; flex-direction: column; gap: 40px; align-items: flex-start;">
                <div class="array-row" id="row-1">
                    <div class="row-label">NUMS 1</div>
                    <div id="line-1" class="partition-line"></div>
                    <div id="cells-1" style="display: flex; gap: 10px;"></div>
                </div>
                <div class="array-row" id="row-2">
                    <div class="row-label">NUMS 2</div>
                    <div id="line-2" class="partition-line"></div>
                    <div id="cells-2" style="display: flex; gap: 10px;"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-reset" onclick="reset()">重置</button>
            <button class="btn-next" id="next-btn" onclick="nextStep()">下一步</button>
        </div>
    </div>

    <script>
        const nums1 = [1, 3, 8];
        const nums2 = [7, 9, 10, 11];
        let steps = [];
        let currentStep = 0;
        let zoomFactor = 1.0;

        function generateSteps() {
            steps = [];
            let n1 = nums1.length, n2 = nums2.length;
            let k = Math.floor((n1 + n2 + 1) / 2);
            let l = 0, r = n1;
            
            while (l < r) {
                let m1 = Math.floor(l + (r - l) / 2);
                let m2 = k - m1;
                steps.push({ type: 'CHECK', l, r, m1, m2, status: `尝试在 N1 切分 m1 = ${m1}` });
                
                if (nums1[m1] < nums2[m2 - 1]) {
                    l = m1 + 1;
                    steps.push({ type: 'ADJUST', l, r, m1: -1, m2: -1, status: `nums1[m1] < nums2[m2-1]，切分点右移` });
                } else {
                    r = m1;
                    steps.push({ type: 'ADJUST', l, r, m1: -1, m2: -1, status: `nums1[m1] >= nums2[m2-1]，切分点左移` });
                }
            }
            
            let m1 = l, m2 = k - m1;
            let c1 = Math.max(m1 <= 0 ? -Infinity : nums1[m1-1], m2 <= 0 ? -Infinity : nums2[m2-1]);
            let res = c1;
            if ((n1 + n2) % 2 === 0) {
                let c2 = Math.min(m1 >= n1 ? Infinity : nums1[m1], m2 >= n2 ? Infinity : nums2[m2]);
                res = (c1 + c2) / 2;
            }
            steps.push({ type: 'FOUND', m1, m2, res, status: `找到完美平衡点！中位数为 ${res}` });
        }

        function init() {
            const container1 = document.getElementById('cells-1');
            const container2 = document.getElementById('cells-2');
            container1.innerHTML = ''; container2.innerHTML = '';
            
            nums1.forEach((n, i) => {
                const div = document.createElement('div');
                div.className = 'cell'; div.id = `c1-${i}`; div.innerText = n;
                container1.appendChild(div);
            });
            nums2.forEach((n, i) => {
                const div = document.createElement('div');
                div.className = 'cell'; div.id = `c2-${i}`; div.innerText = n;
                container2.appendChild(div);
            });

            generateSteps();
            updateUI();
            document.getElementById('next-btn').disabled = false;
        }

        function updateUI() {
            const step = steps[currentStep];
            if (!step) return;

            document.getElementById('viz').style.transform = `scale(${zoomFactor})`;

            const line1 = document.getElementById('line-1');
            const line2 = document.getElementById('line-2');

            const getLinePos = (idx, numsArr) => {
                if (idx <= 0) return -5;
                if (idx >= numsArr.length) {
                    const last = document.getElementById(`c${numsArr === nums1 ? 1 : 2}-${numsArr.length - 1}`);
                    return last.offsetLeft + last.offsetWidth + 5;
                }
                const cell = document.getElementById(`c${numsArr === nums1 ? 1 : 2}-${idx}`);
                return cell.offsetLeft - 5;
            };

            if (step.m1 !== -1) {
                line1.style.opacity = 1; line2.style.opacity = 1;
                line1.style.left = `${getLinePos(step.m1, nums1)}px`;
                line2.style.left = `${getLinePos(step.m2, nums2)}px`;
            } else {
                line1.style.opacity = 0; line2.style.opacity = 0;
            }

            // Cell styling
            const styleRow = (numsArr, mIdx, rowNum) => {
                for (let i = 0; i < numsArr.length; i++) {
                    const cell = document.getElementById(`c${rowNum}-${i}`);
                    cell.className = 'cell';
                    if (mIdx !== -1) {
                        if (i < mIdx) cell.classList.add('left-side');
                        else cell.classList.add('right-side');
                        
                        // Critical comparisons
                        if (step.type === 'CHECK') {
                            if (rowNum === 1 && i === step.m1) cell.classList.add('critical');
                            if (rowNum === 2 && i === step.m2 - 1) cell.classList.add('critical');
                        }
                    }
                    if (step.type === 'FOUND') {
                        if (numsArr[i] === step.res || (typeof step.res === 'number' && Math.abs(numsArr[i] - step.res) < 0.1)) {
                             // Simplified median highlight
                        }
                    }
                }
            };

            styleRow(nums1, step.m1, 1);
            styleRow(nums2, step.m2, 2);

            document.getElementById('status').innerHTML = step.status;
        }

        function nextStep() {
            if (currentStep < steps.length - 1) {
                currentStep++;
                updateUI();
            } else {
                document.getElementById('next-btn').disabled = true;
            }
        }

        function changeZoom(delta) { zoomFactor *= delta; updateUI(); }
        function resetZoom() { zoomFactor = 1.0; updateUI(); }
        function reset() { currentStep = 0; init(); }

        window.onload = init;
    </script>
</body>
</html>
