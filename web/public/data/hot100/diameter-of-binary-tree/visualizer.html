<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二叉树直径可视化</title>
    <style>
        body {
            background-color: #0d1117;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto;
        }
        #container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 900px;
            align-items: center;
        }
        #viz-area {
            width: 100%;
            height: 500px;
            background-color: #161b22;
            border-radius: 12px;
            padding: 20px;
            position: relative;
            border: 1px solid #30363d;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }
        #tree-svg {
            width: 100%;
            height: 100%;
            flex-grow: 1;
        }
        
        .node circle {
            fill: #1e293b;
            stroke: #475569;
            stroke-width: 2px;
            transition: all 0.3s;
        }
        .node text {
            fill: #e2e8f0;
            font-size: 14px;
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none;
        }
        .node.active circle {
            stroke: #a855f7;
            stroke-width: 4px;
            fill: #3b0764;
        }
        .node.processed circle {
            fill: #064e3b;
            stroke: #10b981;
        }
        .node.best circle {
            fill: #4c0519;
            stroke: #f43f5e;
        }
        
        .link {
            stroke: #475569;
            stroke-width: 2px;
            fill: none;
        }
        
        #controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }
        
        button {
            background-color: #f43f5e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: #e11d48; }
        button:disabled { background-color: #30363d; color: #8b949e; cursor: not-allowed; }
        
        #status-text {
            margin-bottom: 10px;
            font-size: 1.1em;
            color: #f59e0b;
            min-height: 3em;
            text-align: center;
        }
        
        #ans-display {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #f43f5e;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1em;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .depth-label {
            fill: #10b981;
            font-size: 12px;
            font-weight: bold;
        }
        h3 { color: #f43f5e; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="container">
        <h3>寻找树中最远的两点</h3>
        <div id="status-text">点击“下一步”开始计算</div>
        <div id="viz-area">
            <div id="ans-display">最大直径 (ans): 0</div>
            <svg id="tree-svg"></svg>
        </div>
        <div id="controls">
            <button id="reset-btn">重置</button>
            <button id="next-btn">下一步</button>
        </div>
    </div>

    <script>
        const treeData = {
            id: 1, val: 1,
            left: {
                id: 2, val: 2,
                left: { id: 4, val: 4, left: null, right: null },
                right: { id: 5, val: 5, left: null, right: null }
            },
            right: { id: 3, val: 3, left: null, right: null }
        };

        let nodes = [];
        let links = [];
        let callStack = [];
        let depths = new Map();
        let globalAns = 0;
        let finished = false;
        let bestNodeId = -1;

        function flatten(node, x, y, dx) {
            if (!node) return;
            node.x = x;
            node.y = y;
            nodes.push(node);
            if (node.left) {
                links.push({ source: node, target: node.left });
                flatten(node.left, x - dx, y + 80, dx / 2);
            }
            if (node.right) {
                links.push({ source: node, target: node.right });
                flatten(node.right, x + dx, y + 80, dx / 2);
            }
        }

        const svg = document.getElementById('tree-svg');
        const statusText = document.getElementById('status-text');
        const ansDisplay = document.getElementById('ans-display');
        const nextBtn = document.getElementById('next-btn');
        const resetBtn = document.getElementById('reset-btn');

        function init() {
            nodes = [];
            links = [];
            depths.clear();
            globalAns = 0;
            finished = false;
            bestNodeId = -1;
            flatten(treeData, 400, 60, 150);
            statusText.innerText = "准备：巡视每个节点，寻找经过它的最长路径";
            ansDisplay.innerText = "最大直径 (ans): 0";
            callStack = [{ node: treeData, state: 'START' }];
            nextBtn.disabled = false;
            render();
        }

        function render() {
            svg.innerHTML = '';
            
            if (nodes.length > 0) {
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                nodes.forEach(n => {
                    minX = Math.min(minX, n.x);
                    maxX = Math.max(maxX, n.x);
                    minY = Math.min(minY, n.y);
                    maxY = Math.max(maxY, n.y);
                });
                
                const padding = 40;
                const width = maxX - minX + padding * 2;
                const height = maxY - minY + padding * 2;
                svg.setAttribute('viewBox', `${minX - padding} ${minY - padding} ${width} ${height}`);
            }

            links.forEach(l => {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', l.source.x); line.setAttribute('y1', l.source.y);
                line.setAttribute('x2', l.target.x); line.setAttribute('y2', l.target.y);
                line.setAttribute('class', 'link');
                svg.appendChild(line);
            });
            nodes.forEach(n => {
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                let className = 'node';
                const active = callStack[callStack.length-1];
                if (active && active.node === n) className += ' active';
                if (depths.has(n.id)) className += ' processed';
                if (n.id === bestNodeId) className += ' best';
                g.setAttribute('class', className);
                
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', n.x); circle.setAttribute('cy', n.y);
                circle.setAttribute('r', 20);
                
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', n.x); text.setAttribute('y', n.y);
                text.textContent = n.val;

                if (depths.has(n.id)) {
                    const depthText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    depthText.setAttribute('x', n.x + 25); depthText.setAttribute('y', n.y - 25);
                    depthText.setAttribute('class', 'depth-label');
                    depthText.textContent = `H=${depths.get(n.id)}`;
                    g.appendChild(depthText);
                }
                
                g.appendChild(circle); g.appendChild(text);
                svg.appendChild(g);
            });
        }

        nextBtn.onclick = () => {
            if (finished) return;
            const current = callStack[callStack.length - 1];

            if (!current.node) {
                statusText.innerText = "遇到空节点，高度为 0";
                callStack.pop();
                const parent = callStack[callStack.length - 1];
                if (parent.state === 'LEFT') { parent.L = 0; parent.state = 'RIGHT_START'; }
                else if (parent.state === 'RIGHT') { parent.R = 0; parent.state = 'CALC'; }
            } else if (current.state === 'START') {
                statusText.innerText = `巡视节点 ${current.node.val}，去看看左子树的深度`;
                current.state = 'LEFT';
                callStack.push({ node: current.node.left, state: 'START' });
            } else if (current.state === 'RIGHT_START') {
                statusText.innerText = `节点 ${current.node.val} 左边高度 ${current.L}。再去看看右子树的深度`;
                current.state = 'RIGHT';
                callStack.push({ node: current.node.right, state: 'START' });
            } else if (current.state === 'CALC') {
                const diameter = current.L + current.R;
                statusText.innerText = `节点 ${current.node.val}：左臂 ${current.L}，右臂 ${current.R}。通过该点的最长路径为 ${diameter}`;
                if (diameter > globalAns) {
                    globalAns = diameter;
                    bestNodeId = current.node.id;
                    ansDisplay.innerText = `最大直径 (ans): ${globalAns}`;
                }
                const h = Math.max(current.L, current.R) + 1;
                depths.set(current.node.id, h);
                callStack.pop();
                if (callStack.length > 0) {
                    const parent = callStack[callStack.length - 1];
                    if (parent.state === 'LEFT') { parent.L = h; parent.state = 'RIGHT_START'; }
                    else if (parent.state === 'RIGHT') { parent.R = h; parent.state = 'CALC'; }
                } else {
                    finished = true;
                    statusText.innerText = `巡视完毕！整棵树的最远距离是 ${globalAns}`;
                    nextBtn.disabled = true;
                }
            }
            render();
        };

        resetBtn.onclick = init;
        init();
    </script>
</body>
</html>
