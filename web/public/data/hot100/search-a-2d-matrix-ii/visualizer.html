<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(20, 20, 23, 0.8);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-violet: #a78bfa;
            --primary-rose: #fb7185;
            --primary-emerald: #10b981;
            --primary-amber: #fbbf24;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); margin: 0; color: #fff; height: 100vh;
            display: flex; align-items: center; justify-content: center; overflow-y: auto;
        }

        .container { width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 40px 20px; }
        
        .status-card { 
            background: var(--card-bg); border: 1px solid var(--border-color); backdrop-blur: 12px;
            padding: 16px 24px; border-radius: 24px; width: 100%; max-width: 600px; 
            text-align: center; min-height: 80px; display: flex; align-items: center; justify-content: center;
        }
        .status-text { font-size: 0.95rem; color: #d1d1d6; line-height: 1.6; }
        .highlight { font-weight: 800; color: var(--primary-violet); }

        .matrix-display { position: relative; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 24px; }
        .matrix { display: grid; gap: 10px; }
        .cell { 
            width: 55px; height: 55px; border: 1.5px solid #333; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; font-weight: bold; background: #111;
            transition: all 0.4s; position: relative;
        }
        .cell.active { border-color: var(--primary-violet); background: rgba(167, 139, 250, 0.1); transform: scale(1.1); box-shadow: 0 0 20px rgba(167, 139, 250, 0.3); z-index: 10; }
        .cell.found { border-color: var(--primary-emerald); background: rgba(16, 185, 129, 0.2); box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        .cell.visited { border-color: rgba(255,255,255,0.1); color: #444; }
        .cell.excluded { opacity: 0.2; transform: scale(0.9); }

        .controls { display: flex; gap: 16px; margin-top: 10px; }
        button { padding: 12px 32px; border-radius: 16px; border: 1px solid var(--border-color); background: #1c1c1e; color: #fff; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; }
        button:hover:not(:disabled) { background: #2c2c2e; transform: translateY(-2px); }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.2; cursor: not-allowed; }

        .target-box { background: var(--card-bg); border: 1px solid var(--border-color); padding: 8px 20px; border-radius: 99px; font-size: 0.9rem; font-weight: 800; color: var(--primary-amber); }
    </style>
</head>
<body>
    <div class="container">
        <div class="target-box">寻找目标: 20</div>
        <div class="status-card">
            <div id="status" class="status-text">准备开始！我们要从“右上角”出发寻找宝藏。</div>
        </div>

        <div class="matrix-display">
            <div class="matrix" id="matrix"></div>
        </div>

        <div class="controls">
            <button onclick="reset()">重置</button>
            <button onclick="nextStep()" id="next-btn">下一步</button>
        </div>
    </div>

    <script>
        const matrixData = [
            [1, 4, 7, 11, 15],
            [2, 5, 8, 12, 19],
            [3, 6, 9, 16, 22],
            [10, 13, 14, 17, 24],
            [18, 21, 23, 26, 30]
        ];
        const target = 20;
        const rows = matrixData.length;
        const cols = matrixData[0].length;
        
        let r = 0, c = cols - 1;
        let isFinished = false;
        let path = [];

        function init() {
            const container = document.getElementById('matrix');
            container.style.gridTemplateColumns = `repeat(${cols}, 55px)`;
            container.innerHTML = '';
            for(let i=0; i<rows; i++) {
                for(let j=0; j<cols; j++) {
                    const div = document.createElement('div');
                    div.className = 'cell';
                    div.id = `cell-${i}-${j}`;
                    div.innerText = matrixData[i][j];
                    container.appendChild(div);
                }
            }
            updateUI();
            document.getElementById('next-btn').disabled = false;
        }

        function updateUI() {
            document.querySelectorAll('.cell').forEach(cell => {
                cell.classList.remove('active');
            });

            path.forEach(pos => {
                document.getElementById(`cell-${pos[0]}-${pos[1]}`).classList.add('visited');
            });

            if (!isFinished) {
                const currentCell = document.getElementById(`cell-${r}-${c}`);
                if (currentCell) currentCell.classList.add('active');
            }
        }

        function nextStep() {
            if (isFinished) return;
            const status = document.getElementById('status');
            const val = matrixData[r][c];
            path.push([r, c]);

            if (val === target) {
                status.innerHTML = `找到了！<span class="highlight" style="color:var(--primary-emerald)">${val}</span> 正好等于目标！任务圆满完成。`;
                document.getElementById(`cell-${r}-${c}`).classList.add('found');
                isFinished = true;
                document.getElementById('next-btn').disabled = true;
            } else if (val < target) {
                status.innerHTML = `脚下的数 <span class="highlight">${val}</span> 比目标小。<br>这一行左边的数更小，所以不用看了。我们要往<span class="highlight" style="color:var(--primary-rose)">下</span>走。`;
                r++;
            } else {
                status.innerHTML = `脚下的数 <span class="highlight">${val}</span> 比目标大。<br>这一列下面的数更大，所以不用看了。我们要往<span class="highlight" style="color:var(--primary-rose)">左</span>走。`;
                c--;
            }

            if (r >= rows || c < 0) {
                status.innerHTML = `走出了楼梯还没找到目标... 看来它不在这个矩阵里。`;
                isFinished = true;
                document.getElementById('next-btn').disabled = true;
            }

            updateUI();
        }

        function reset() {
            r = 0; c = cols - 1;
            isFinished = false;
            path = [];
            document.getElementById('status').innerText = "已重置，准备开始。";
            init();
        }

        init();
    </script>
</body>
</html>
