<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>72. 编辑距离 - 可视化演示</title>
    <style>
        :root {
            --primary-purple: #a855f7;
            --emerald-green: #10b981;
            --rose-red: #f43f5e;
            --amber-yellow: #f59e0b;
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --border-color: #30363d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            max-width: 900px;
            width: 100%;
            border: 1px solid var(--border-color);
        }

        h2 {
            text-align: center;
            color: var(--primary-purple);
            margin-bottom: 25px;
            font-weight: 300;
        }

        .table-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            overflow-x: auto;
        }

        .dp-table {
            border-collapse: collapse;
            font-family: monospace;
        }

        .dp-table th, .dp-table td {
            width: 45px;
            height: 45px;
            border: 1px solid var(--border-color);
            text-align: center;
            transition: all 0.2s ease;
        }

        .header-cell { background: #21262d; font-weight: bold; color: var(--amber-yellow); }
        .dp-cell { background: #1c2128; font-size: 16px; }

        .active { border: 2px solid var(--amber-yellow); transform: scale(1.05); z-index: 10; }
        .checking-diagonal { background: rgba(16, 185, 129, 0.2); }
        .checking-top { background: rgba(244, 63, 94, 0.1); }
        .checking-left { background: rgba(168, 85, 247, 0.1); }
        
        .matched { color: var(--emerald-green); font-weight: bold; }
        .edit { color: var(--rose-red); }

        .status-text {
            height: 60px;
            text-align: center;
            font-size: 18px;
            color: var(--amber-yellow);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: var(--primary-purple);
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }
        button:disabled { background: #30363d; cursor: not-allowed; }

        .legend {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
            font-size: 12px;
            color: #8b949e;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
    </style>
</head>
<body>

<div class="container">
    <h2>72. 编辑距离 (Edit Distance)</h2>
    
    <div class="table-container">
        <table class="dp-table" id="dpTable"></table>
    </div>

    <div class="status-text" id="status">点击“下一步”开始，初始化手术单</div>

    <div class="controls">
        <button id="resetBtn">重置</button>
        <button id="nextBtn">下一步</button>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: rgba(16, 185, 129, 0.2);"></div> 替换 (或相同)</div>
        <div class="legend-item"><div class="dot" style="background: rgba(244, 63, 94, 0.1);"></div> 删除</div>
        <div class="legend-item"><div class="dot" style="background: rgba(168, 85, 247, 0.1);"></div> 插入</div>
    </div>
</div>

<script>
    const word1 = "horse";
    const word2 = "ros";
    const M = word1.length;
    const N = word2.length;
    let dp = Array.from({ length: M + 1 }, () => Array(N + 1).fill(0));
    let r = 0, c = 0;
    let phase = 0; // 0: init borders, 1: fill middle

    function init() {
        const table = document.getElementById('dpTable');
        table.innerHTML = '';
        
        // Header
        const headerRow = document.createElement('tr');
        headerRow.innerHTML = `<th class="header-cell"></th><th class="header-cell">""</th>`;
        for (let char of word2) headerRow.innerHTML += `<th class="header-cell">${char}</th>`;
        table.appendChild(headerRow);

        for (let i = 0; i <= M; i++) {
            const row = document.createElement('tr');
            const rowHeader = document.createElement('th');
            rowHeader.className = 'header-cell';
            rowHeader.textContent = i === 0 ? '""' : word1[i-1];
            row.appendChild(rowHeader);

            for (let j = 0; j <= N; j++) {
                const cell = document.createElement('td');
                cell.className = 'dp-cell';
                cell.id = `cell-${i}-${j}`;
                cell.textContent = '';
                row.appendChild(cell);
            }
            table.appendChild(row);
        }

        dp = Array.from({ length: M + 1 }, () => Array(N + 1).fill(0));
        r = 0; c = 0; phase = 0;
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('status').textContent = '准备就绪。开始初始化第一行和第一列。';
    }

    function updateView() {
        document.querySelectorAll('.dp-cell').forEach(cell => cell.classList.remove('active', 'checking-diagonal', 'checking-top', 'checking-left'));
        
        const cell = document.getElementById(`cell-${r}-${c}`);
        cell.classList.add('active');
        const status = document.getElementById('status');

        if (phase === 0) {
            dp[r][c] = (r === 0) ? c : r;
            cell.textContent = dp[r][c];
            status.textContent = `初始化边界：把字符串变成空串需要 ${dp[r][c]} 步操作。`;
        } else {
            const char1 = word1[r-1];
            const char2 = word2[c-1];
            if (char1 === char2) {
                dp[r][c] = dp[r-1][c-1];
                document.getElementById(`cell-${r-1}-${c-1}`).classList.add('checking-diagonal');
                cell.classList.add('matched');
                status.textContent = `字符相同 ('${char1}')！不需要手术费。费用继承自斜上：${dp[r][c]}`;
            } else {
                const diag = dp[r-1][c-1]; // replace
                const top = dp[r-1][c];    // delete
                const left = dp[r][c-1];   // insert
                
                document.getElementById(`cell-${r-1}-${c-1}`).classList.add('checking-diagonal');
                document.getElementById(`cell-${r-1}-${c}`).classList.add('checking-top');
                document.getElementById(`cell-${r}-${c-1}`).classList.add('checking-left');
                
                dp[r][c] = Math.min(diag, top, left) + 1;
                cell.classList.add('edit');
                status.textContent = `字符不同 ('${char1}' vs '${char2}')。选最省钱手术：min(替换:${diag}, 删除:${top}, 插入:${left}) + 1 = ${dp[r][c]}`;
            }
            cell.textContent = dp[r][c];
        }
    }

    function next() {
        updateView();
        
        if (phase === 0) {
            if (r < M) {
                r++;
            } else if (c < N) {
                if (c === 0) r = 0;
                c++;
            } else {
                phase = 1; r = 1; c = 1;
            }
        } else {
            c++;
            if (c > N) {
                c = 1;
                r++;
            }
            if (r > M) {
                document.getElementById('nextBtn').disabled = true;
                document.getElementById('status').textContent = `整容方案已定！最少手术费（编辑距离）为: ${dp[M][N]}`;
            }
        }
    }

    document.getElementById('nextBtn').addEventListener('click', next);
    document.getElementById('resetBtn').addEventListener('click', init);

    init();
</script>

</body>
</html>
