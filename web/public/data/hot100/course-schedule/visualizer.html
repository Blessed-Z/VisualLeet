<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>207. 课程表 可视化</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --primary-purple: #9d4edd;
            --rose-red: #ff006e;
            --emerald-green: #06d6a0;
            --amber: #ffbe0b;
            --text-color: #e6edf3;
            --node-bg: #161b22;
        }

        html, body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow-x: hidden; overflow-y: auto;
        }

        body { display: flex; flex-direction: column; align-items: center; padding: 40px 0; }

        .container {
            width: 95%; max-width: 1000px;
            display: flex; flex-direction: column; gap: 20px; padding-bottom: 100px;
        }

        .status-box {
            background-color: var(--node-bg); padding: 20px; border-radius: 12px;
            border-left: 5px solid var(--primary-purple); min-height: 80px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 1.1em; box-shadow: 0 4px 15px rgba(0,0,0,0.3); line-height: 1.6;
        }

        .visualization-area {
            position: relative; border: 1px solid #30363d; border-radius: 20px;
            background: #1c2128; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
            height: 450px;
        }

        svg { width: 100%; height: 100%; }

        .node circle {
            fill: var(--node-bg); stroke: #30363d; stroke-width: 3; transition: all 0.5s;
        }
        .node text {
            fill: var(--text-color); font-size: 16px; font-weight: bold;
            text-anchor: middle; dominant-baseline: middle; pointer-events: none;
        }

        /* Status colors */
        .node.unvisited circle { stroke: #30363d; }
        .node.visiting circle { stroke: var(--amber); fill: rgba(255, 190, 11, 0.2); box-shadow: 0 0 15px var(--amber); }
        .node.visited circle { stroke: var(--emerald-green); fill: rgba(6, 214, 160, 0.1); }
        .node.cycle circle { stroke: var(--rose-red); fill: rgba(255, 0, 110, 0.3); animation: shake 0.5s infinite; }

        .link { stroke: #30363d; stroke-width: 2; fill: none; transition: all 0.5s; }
        .link.active { stroke: var(--amber); stroke-width: 3; }
        .link.cycle { stroke: var(--rose-red); stroke-width: 4; }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .zoom-controls { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 100; }
        .zoom-btn {
            width: 35px; height: 35px; border-radius: 8px; background: rgba(22, 27, 34, 0.8);
            border: 1px solid #30363d; color: var(--text-color); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-weight: bold; backdrop-blur: 4px;
        }
        .zoom-btn:hover { background: #30363d; }

        .controls { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        button {
            padding: 12px 35px; border-radius: 35px; border: none; cursor: pointer;
            font-weight: bold; transition: all 0.3s; font-size: 1.1em; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .btn-next { background-color: var(--emerald-green); color: #000; }
        .btn-reset { background-color: #30363d; color: var(--text-color); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        .highlight-text { font-weight: bold; padding: 0 4px; border-radius: 4px; }
        
        .legend {
            position: absolute; top: 20px; left: 20px; background: rgba(22, 27, 34, 0.8);
            padding: 10px; border-radius: 8px; border: 1px solid #30363d; font-size: 0.85em;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
        .dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid; }
        .dot.unvisited { border-color: #30363d; background: transparent; }
        .dot.visiting { border-color: var(--amber); background: rgba(255, 190, 11, 0.2); }
        .dot.visited { border-color: var(--emerald-green); background: rgba(6, 214, 160, 0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 课程表 (拓扑排序/判环)</h1>
        <div class="status-box">
            <div id="status">准备检查选课关系图中是否存在死循环。</div>
            <div id="sub-status" style="font-size: 0.85em; color: #8b949e; margin-top: 8px;">点击下一步开始 DFS 探索。</div>
        </div>

        <div class="visualization-area" id="viz">
            <div class="legend">
                <div class="legend-item"><div class="dot unvisited"></div> 0 (未访问)</div>
                <div class="legend-item"><div class="dot visiting"></div> 1 (正在访问)</div>
                <div class="legend-item"><div class="dot visited"></div> -1 (安全通过)</div>
            </div>
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="changeZoom(1.1)">+</button>
                <button class="zoom-btn" onclick="changeZoom(0.9)">-</button>
                <button class="zoom-btn" onclick="resetZoom()">⟲</button>
            </div>
            <svg id="graph-svg"></svg>
        </div>

        <div class="controls">
            <button class="btn-reset" onclick="reset()">重置</button>
            <button class="btn-next" id="next-btn" onclick="nextStep()">下一步</button>
        </div>
    </div>

    <script>
        const numCourses = 4;
        const prerequisites = [[1,0], [2,1], [3,2], [1,3]]; // Contains a cycle: 1->2->3->1
        // Note: Graph edges are pre -> cur, so 0->1, 1->2, 2->3, 3->1
        
        const adjacency = Array.from({length: numCourses}, () => []);
        prerequisites.forEach(([cur, pre]) => {
            adjacency[pre].push(cur);
        });

        // Fixed layout for this specific example
        const layout = [
            { id: 0, x: 100, y: 200 },
            { id: 1, x: 250, y: 100 },
            { id: 2, x: 400, y: 100 },
            { id: 3, x: 325, y: 250 }
        ];

        let steps = [];
        let currentStep = 0;
        let zoomFactor = 1.0;

        function generateSteps() {
            steps = [];
            let flags = Array(numCourses).fill(0);
            
            steps.push({ type: 'INIT', flags: [...flags], u: null, v: null });

            function dfs(i) {
                if (flags[i] === -1) return true;
                if (flags[i] === 1) {
                    steps.push({ type: 'CYCLE', flags: [...flags], u: i, v: null });
                    return false;
                }

                flags[i] = 1;
                steps.push({ type: 'VISIT', flags: [...flags], u: i, v: null });

                for (let j of adjacency[i]) {
                    steps.push({ type: 'EDGE', flags: [...flags], u: i, v: j });
                    if (!dfs(j)) return false;
                }

                flags[i] = -1;
                steps.push({ type: 'DONE', flags: [...flags], u: i, v: null });
                return true;
            }

            for (let i = 0; i < numCourses; i++) {
                if (!dfs(i)) {
                    steps.push({ type: 'FAILED', flags: [...flags], u: null, v: null });
                    return;
                }
            }
            steps.push({ type: 'SUCCESS', flags: [...flags], u: null, v: null });
        }

        const svg = document.getElementById('graph-svg');

        function render() {
            svg.innerHTML = '';
            
            // Define arrow markers
            const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
            ['normal', 'active', 'cycle'].forEach(type => {
                const marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
                marker.setAttribute("id", `arrow-${type}`);
                marker.setAttribute("viewBox", "0 -5 10 10");
                marker.setAttribute("refX", "28"); // Offset for node radius
                marker.setAttribute("refY", "0");
                marker.setAttribute("markerWidth", "6");
                marker.setAttribute("markerHeight", "6");
                marker.setAttribute("orient", "auto");
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", "M0,-5L10,0L0,5");
                path.setAttribute("fill", type === 'normal' ? '#30363d' : type === 'active' ? 'var(--amber)' : 'var(--rose-red)');
                marker.appendChild(path);
                defs.appendChild(marker);
            });
            svg.appendChild(defs);

            const step = steps[currentStep];
            if (!step) return;

            // Draw edges
            layout.forEach(u => {
                adjacency[u.id].forEach(vId => {
                    const v = layout.find(n => n.id === vId);
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', u.x); line.setAttribute('y1', u.y);
                    line.setAttribute('x2', v.x); line.setAttribute('y2', v.y);
                    
                    let linkCls = 'link';
                    let markerType = 'normal';
                    
                    if (step.type === 'EDGE' && step.u === u.id && step.v === v.id) {
                        linkCls += ' active'; markerType = 'active';
                    } else if (step.type === 'CYCLE' && step.u === v.id) {
                        // If we are at cycle detection, highlight incoming active edge
                        if (step.flags[u.id] === 1) {
                            linkCls += ' cycle'; markerType = 'cycle';
                        }
                    }
                    
                    line.setAttribute('class', linkCls);
                    line.setAttribute('marker-end', `url(#arrow-${markerType})`);
                    svg.appendChild(line);
                });
            });

            // Draw nodes
            layout.forEach(n => {
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                let cls = 'node';
                
                const f = step.flags[n.id];
                if (f === 0) cls += ' unvisited';
                else if (f === 1) cls += ' visiting';
                else if (f === -1) cls += ' visited';

                if (step.type === 'CYCLE' && step.u === n.id) {
                    cls += ' cycle';
                }

                g.setAttribute('class', cls);
                
                const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                c.setAttribute('cx', n.x); c.setAttribute('cy', n.y); c.setAttribute('r', 20);
                
                const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                t.setAttribute('x', n.x); t.setAttribute('y', n.y); t.textContent = n.id;
                
                g.appendChild(c); g.appendChild(t);
                svg.appendChild(g);
            });

            // Adjust ViewBox
            const vbW = 500 * zoomFactor; const vbH = 400 * zoomFactor;
            svg.setAttribute('viewBox', `${250 - vbW/2} ${175 - vbH/2} ${vbW} ${vbH}`);

            // Status Update
            const status = document.getElementById('status');
            const subStatus = document.getElementById('sub-status');

            if (step.type === 'INIT') {
                status.innerHTML = `初始状态：所有课程都是 <span class="highlight-text" style="color:#8b949e">0 (白牌)</span>。`;
                subStatus.innerText = `准备从课程 0 开始深度优先搜索。`;
            } else if (step.type === 'VISIT') {
                status.innerHTML = `探查课程 <span class="amber highlight-text">${step.u}</span>。`;
                subStatus.innerHTML = `挂上 <span class="amber highlight-text">1 (黄牌)</span>，表示我们正在探索它的后续链路。`;
            } else if (step.type === 'EDGE') {
                status.innerHTML = `顺藤摸瓜：看学完 ${step.u} 能解锁什么。`;
                subStatus.innerHTML = `发现后续课程 <span class="amber highlight-text">${step.v}</span>，准备顺着路径走下去。`;
            } else if (step.type === 'DONE') {
                status.innerHTML = `✅ 课程 <span class="emerald highlight-text">${step.u}</span> 及其后续课程全部安全！`;
                subStatus.innerHTML = `没有发现死循环。摘下黄牌，挂上 <span class="emerald highlight-text">-1 (绿牌)</span>。`;
            } else if (step.type === 'CYCLE') {
                status.innerHTML = `🚨 <b>发现死循环 (环)！</b>`;
                subStatus.innerHTML = `我们在探索中，再次遇到了正挂着 <span class="amber highlight-text">黄牌 (1)</span> 的课程 ${step.u}！这说明绕了一圈回到了原点。`;
            } else if (step.type === 'FAILED') {
                status.innerHTML = `❌ <b>选课失败。</b>`;
                subStatus.innerText = `存在死循环，永远无法修完所有课程，返回 false。`;
                document.getElementById('next-btn').disabled = true;
            } else if (step.type === 'SUCCESS') {
                status.innerHTML = `🎉 <b>选课成功！</b>`;
                subStatus.innerText = `所有课程都拿到了绿牌，完美毕业！`;
                document.getElementById('next-btn').disabled = true;
            }
        }

        function nextStep() {
            if (currentStep < steps.length - 1) {
                currentStep++;
                render();
            }
        }

        function changeZoom(delta) { zoomFactor *= delta; zoomFactor = Math.max(0.4, Math.min(3, zoomFactor)); render(); }
        function resetZoom() { zoomFactor = 1.0; render(); }
        function reset() { currentStep = 0; document.getElementById('next-btn').disabled = false; init(); }

        function init() {
            generateSteps();
            render();
        }

        window.onload = init;
    </script>
</body>
</html>
