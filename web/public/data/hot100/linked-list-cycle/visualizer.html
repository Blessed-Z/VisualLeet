<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(20, 20, 23, 0.8);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-violet: #a78bfa;
            --primary-rose: #fb7185;
            --primary-emerald: #10b981;
            --primary-amber: #fbbf24;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); margin: 0; color: #fff; height: 100vh;
            display: flex; align-items: center; justify-content: center; overflow-y: auto;
        }

        .container { width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 40px 20px; }
        
        .status-card { 
            background: var(--card-bg); border: 1px solid var(--border-color); backdrop-blur: 12px;
            padding: 16px 24px; border-radius: 24px; width: 100%; max-width: 600px; 
            text-align: center; min-height: 80px; display: flex; align-items: center; justify-content: center;
        }
        .status-text { font-size: 0.95rem; color: #d1d1d6; line-height: 1.6; }
        .highlight { font-weight: 800; color: var(--primary-violet); }

        .list-area { position: relative; width: 500px; height: 300px; margin-top: 40px; }
        
        .node {
            position: absolute; width: 45px; height: 45px; background: #111; border: 1.5px solid #333;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 0.9rem; transition: all 0.5s; z-index: 10;
        }
        
        .pointer {
            position: absolute; width: 55px; height: 55px; border-radius: 50%;
            border: 2px solid transparent; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        .ptr-label { position: absolute; top: -25px; font-size: 0.6rem; font-weight: 900; text-transform: uppercase; }
        
        #slow-ptr { border-color: var(--primary-amber); box-shadow: 0 0 15px var(--primary-amber); }
        #slow-ptr .ptr-label { color: var(--primary-amber); }
        #fast-ptr { border-color: var(--primary-violet); box-shadow: 0 0 15px var(--primary-violet); }
        #fast-ptr .ptr-label { color: var(--primary-violet); }

        .controls { display: flex; gap: 16px; margin-top: 20px; }
        button { padding: 12px 32px; border-radius: 16px; border: 1px solid var(--border-color); background: #1c1c1e; color: #fff; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; }
        button:hover:not(:disabled) { background: #2c2c2e; transform: translateY(-2px); }
        button:disabled { opacity: 0.2; cursor: not-allowed; }

        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        line, path { stroke: #333; stroke-width: 2; fill: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-card">
            <div id="status" class="status-text">准备开始！黄色是乌龟(Slow)，紫色是兔子(Fast)。</div>
        </div>

        <div class="list-area" id="list-area">
            <svg id="svg-layer"></svg>
            <div id="slow-ptr" class="pointer"><span class="ptr-label">Slow</span></div>
            <div id="fast-ptr" class="pointer"><span class="ptr-label">Fast</span></div>
            <!-- Nodes -->
        </div>

        <div class="controls">
            <button onclick="reset()">重置</button>
            <button onclick="nextStep()" id="next-btn">下一步</button>
        </div>
    </div>

    <script>
        const nodes = [
            { id: 0, x: 50, y: 150 },
            { id: 1, x: 150, y: 150 },
            { id: 2, x: 250, y: 100 },
            { id: 3, x: 350, y: 150 },
            { id: 4, x: 250, y: 200 }
        ];
        // Cycle: 4 -> 1
        const nextMap = { 0: 1, 1: 2, 2: 3, 3: 4, 4: 1 };
        
        let slow = 0;
        let fast = 1;
        let isStarted = false;

        function init() {
            const area = document.getElementById('list-area');
            const svg = document.getElementById('svg-layer');
            svg.innerHTML = '';
            
            nodes.forEach(n => {
                const div = document.createElement('div');
                div.className = 'node';
                div.id = `node-${n.id}`;
                div.style.left = n.x + 'px';
                div.style.top = n.y + 'px';
                div.innerText = n.id;
                area.appendChild(div);
                
                // Draw line to next
                const target = nodes[nextMap[n.id]];
                if (n.id === 4) {
                    // Draw curved path for cycle
                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    const d = `M ${n.x + 22} ${n.y + 22} Q 150 250 ${target.x + 22} ${target.y + 22}`;
                    path.setAttribute("d", d);
                    svg.appendChild(path);
                } else {
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", n.x + 22);
                    line.setAttribute("y1", n.y + 22);
                    line.setAttribute("x2", target.x + 22);
                    line.setAttribute("y2", target.y + 22);
                    svg.appendChild(line);
                }
            });
            updateUI();
            document.getElementById('next-btn').disabled = false;
        }

        function updateUI() {
            const sNode = nodes[slow];
            const fNode = nodes[fast];
            
            document.getElementById('slow-ptr').style.left = (sNode.x - 5) + 'px';
            document.getElementById('slow-ptr').style.top = (sNode.y - 5) + 'px';
            
            document.getElementById('fast-ptr').style.left = (fNode.x - 5) + 'px';
            document.getElementById('fast-ptr').style.top = (fNode.y - 5) + 'px';
        }

        function nextStep() {
            const status = document.getElementById('status');
            
            if (slow === fast) {
                status.innerHTML = `🎉 <span class="highlight" style="color:var(--primary-emerald)">相遇了！</span> 兔子在位置 ${slow} 追上了乌龟。证明链表有环！`;
                document.getElementById('next-btn').disabled = true;
                return;
            }

            slow = nextMap[slow];
            fast = nextMap[nextMap[fast]];
            
            status.innerHTML = `乌龟走 1 步到位置 ${slow}，兔子飞 2 步到位置 ${fast}...`;
            updateUI();
        }

        function reset() {
            slow = 0; fast = 1;
            document.getElementById('status').innerText = "已重置，准备开始。";
            init();
        }

        init();
    </script>
</body>
</html>
