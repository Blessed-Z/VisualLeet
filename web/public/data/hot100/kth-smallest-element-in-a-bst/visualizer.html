<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>230. 二叉搜索树中第 K 小的元素 可视化</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --primary-purple: #9d4edd;
            --rose-red: #ff006e;
            --emerald-green: #06d6a0;
            --amber: #ffbe0b;
            --text-color: #e6edf3;
            --node-bg: #161b22;
        }

        html, body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow-x: hidden; overflow-y: auto;
        }

        body { display: flex; flex-direction: column; align-items: center; padding: 40px 0; }

        .container {
            width: 95%; max-width: 1100px;
            display: flex; flex-direction: column; gap: 20px; padding-bottom: 100px;
        }

        .status-box {
            background-color: var(--node-bg); padding: 20px; border-radius: 12px;
            border-left: 5px solid var(--primary-purple); min-height: 80px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 1.1em; box-shadow: 0 4px 15px rgba(0,0,0,0.3); line-height: 1.6;
        }

        .visualization-area {
            position: relative; height: 400px; border: 1px solid #30363d; border-radius: 20px;
            background: radial-gradient(circle at center, #1c2128 0%, #0d1117 100%);
            display: flex; align-items: center; justify-content: center; overflow: visible;
        }

        svg { width: 100%; height: 100%; }
        .node circle { fill: var(--node-bg); stroke: #30363d; stroke-width: 2; transition: all 0.5s; }
        .node text { fill: var(--text-color); font-size: 14px; text-anchor: middle; dominant-baseline: middle; pointer-events: none; }
        
        .node.active circle { stroke: var(--amber); stroke-width: 4; fill: rgba(255, 190, 11, 0.1); }
        .node.visited circle { stroke: var(--primary-purple); }
        .node.target circle { stroke: var(--emerald-green); stroke-width: 5; fill: rgba(6, 214, 160, 0.2); }

        .link { stroke: #30363d; stroke-width: 2; fill: none; transition: all 0.5s; }

        .zoom-controls { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 100; }
        .zoom-btn {
            width: 35px; height: 35px; border-radius: 8px; background: rgba(22, 27, 34, 0.8);
            border: 1px solid #30363d; color: var(--text-color); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-weight: bold; backdrop-blur: 4px;
        }
        .zoom-btn:hover { background: #30363d; }

        .controls { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        button {
            padding: 12px 35px; border-radius: 35px; border: none; cursor: pointer;
            font-weight: bold; transition: all 0.3s; font-size: 1.1em; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .btn-next { background-color: var(--emerald-green); color: #000; }
        .btn-reset { background-color: #30363d; color: var(--text-color); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        .counter-box {
            position: absolute; bottom: 20px; right: 20px; background: rgba(22, 27, 34, 0.8);
            padding: 10px 20px; border-radius: 12px; border: 1px solid #30363d; font-family: monospace;
        }
        .k-val { color: var(--amber); font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔢 BST 第 K 小元素</h1>
        <div class="status-box">
            <div id="status">准备开始寻找。我们要找第 <span class="amber highlight">k = 3</span> 小的元素。</div>
            <div id="sub-status" style="font-size: 0.85em; color: #8b949e; margin-top: 8px;">点击下一步进行中序遍历。</div>
        </div>

        <div class="visualization-area" id="viz">
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="changeZoom(1.1)">+</button>
                <button class="zoom-btn" onclick="changeZoom(0.9)">-</button>
                <button class="zoom-btn" onclick="resetZoom()">⟲</button>
            </div>
            <div class="counter-box">倒计时 K: <span id="k-display" class="k-val">3</span></div>
            <svg id="tree-svg"></svg>
        </div>

        <div class="controls">
            <button class="btn-reset" onclick="reset()">重置</button>
            <button class="btn-next" id="next-btn" onclick="nextStep()">下一步</button>
        </div>
    </div>

    <script>
        const targetK = 3;
        const treeData = {
            val: 5, id: "0",
            left: {
                val: 3, id: "0L",
                left: { val: 2, id: "0LL", left: { val: 1, id: "0LLL", left: null, right: null }, right: null },
                right: { val: 4, id: "0LR", left: null, right: null }
            },
            right: {
                val: 6, id: "0R",
                left: null, right: null
            }
        };

        let nodes = [], links = [], steps = [], currentStep = 0, zoomFactor = 1.0;
        let kCounter = targetK;

        function flatten(node, x, y, dx) {
            if (!node) return;
            const n = { ...node, x, y };
            nodes.push(n);
            if (node.left) {
                links.push({ source: n, tid: node.left.id });
                flatten(node.left, x - dx, y + 80, dx / 2);
            }
            if (node.right) {
                links.push({ source: n, tid: node.right.id });
                flatten(node.right, x + dx, y + 80, dx / 2);
            }
        }

        function solve(node) {
            if (!node) return;
            
            steps.push({ type: 'ENTER', node });
            solve(node.left);
            
            if (kCounter === 0) return;
            
            kCounter--;
            steps.push({ type: 'VISIT', node, kAfter: kCounter, isTarget: kCounter === 0 });
            
            if (kCounter === 0) return;
            
            solve(node.right);
            steps.push({ type: 'LEAVE', node });
        }

        const svg = document.getElementById('tree-svg');

        function render() {
            svg.innerHTML = '';
            const step = steps[currentStep] || { node: null, kAfter: targetK };
            
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            nodes.forEach(n => {
                minX = Math.min(minX, n.x); maxX = Math.max(maxX, n.x);
                minY = Math.min(minY, n.y); maxY = Math.max(maxY, n.y);
            });

            links.forEach(l => {
                const targetNode = nodes.find(n => n.id === l.tid);
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', l.source.x); line.setAttribute('y1', l.source.y);
                line.setAttribute('x2', targetNode.x); line.setAttribute('y2', targetNode.y);
                line.setAttribute('class', 'link');
                svg.appendChild(line);
            });

            nodes.forEach(n => {
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                let cls = 'node';
                
                const history = steps.slice(0, currentStep + 1).filter(s => s.type === 'VISIT' && s.node.id === n.id);
                if (history.length > 0) {
                    if (history[0].isTarget) cls += ' target';
                    else cls += ' visited';
                }
                if (step.node && step.node.id === n.id) cls += ' active';

                g.setAttribute('class', cls);
                const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                c.setAttribute('cx', n.x); c.setAttribute('cy', n.y); c.setAttribute('r', 20);
                const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                t.setAttribute('x', n.x); t.setAttribute('y', n.y); t.textContent = n.val;
                g.appendChild(c); g.appendChild(t);
                svg.appendChild(g);
            });

            const width = Math.max(maxX - minX + 100, 400);
            const height = Math.max(maxY - minY + 100, 300);
            const midX = (minX + maxX) / 2 || 0;
            const midY = (minY + maxY) / 2 || 0;
            const vbW = width * zoomFactor; const vbH = height * zoomFactor;
            svg.setAttribute('viewBox', `${midX - vbW/2} ${midY - vbH/2} ${vbW} ${vbH}`);

            document.getElementById('k-display').innerText = (step.kAfter !== undefined) ? step.kAfter : kCounter;
        }

        function nextStep() {
            if (currentStep >= steps.length) return;
            const step = steps[currentStep];
            const status = document.getElementById('status');
            const subStatus = document.getElementById('sub-status');

            if (step.type === 'ENTER') {
                status.innerHTML = `来到节点 <span class="amber highlight">${step.node.val}</span>。`;
                subStatus.innerText = `根据中序遍历规则，先去它的左子树寻找更小的。`;
            } else if (step.type === 'VISIT') {
                status.innerHTML = `访问节点 <span class="purple highlight">${step.node.val}</span>。`;
                subStatus.innerHTML = `计数器减 1，目前剩余 <span class="amber highlight">${step.kAfter}</span> 次。`;
                if (step.isTarget) {
                    status.innerHTML = `✨ <b>找到了！</b>`;
                    subStatus.innerHTML = `计数器归零，第 ${targetK} 小的元素就是 <span class="emerald highlight">${step.node.val}</span>。`;
                }
            } else {
                status.innerHTML = `离开节点 <span class="rose">${step.node.val}</span>。`;
                subStatus.innerText = `已经处理完该节点的左子树和自身，现在去右子树。`;
            }

            render();
            if (step.isTarget) {
                document.getElementById('next-btn').disabled = true;
            } else {
                currentStep++;
            }
        }

        function changeZoom(delta) { zoomFactor *= delta; zoomFactor = Math.max(0.2, Math.min(5, zoomFactor)); render(); }
        function resetZoom() { zoomFactor = 1.0; render(); }
        function reset() { currentStep = 0; kCounter = targetK; init(); }

        function init() {
            nodes = []; links = []; steps = [];
            kCounter = targetK;
            flatten(treeData, 0, 0, 150);
            solve(treeData);
            render();
        }

        window.onload = init;
    </script>
</body>
</html>
