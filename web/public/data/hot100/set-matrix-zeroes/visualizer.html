<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(20, 20, 23, 0.8);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-violet: #a78bfa;
            --primary-rose: #fb7185;
            --primary-emerald: #10b981;
            --primary-amber: #fbbf24;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); margin: 0; color: #fff; height: 100vh;
            display: flex; align-items: center; justify-content: center; overflow-y: auto;
        }

        .container { width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 40px 20px; }
        
        .status-card { 
            background: var(--card-bg); border: 1px solid var(--border-color); backdrop-blur: 12px;
            padding: 16px 24px; border-radius: 24px; width: 100%; max-width: 600px; 
            text-align: center; min-height: 80px; display: flex; align-items: center; justify-content: center;
        }
        .status-text { font-size: 0.95rem; color: #d1d1d6; line-height: 1.6; }
        .highlight { font-weight: 800; color: var(--primary-violet); }

        .matrix-container {
            display: grid;
            grid-template-columns: repeat(4, 60px);
            gap: 10px;
            padding: 20px;
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            position: relative;
        }

        .cell {
            width: 60px; height: 60px; border: 1px solid #333; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; font-weight: bold; background: #111;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 标记首行首列 */
        .is-header { border-color: #444; background: #1a1a1a; }
        .is-flag-row { border-top: 3px solid var(--primary-rose); }
        .is-flag-col { border-left: 3px solid var(--primary-rose); }

        .cell.active { border-color: var(--primary-violet); background: rgba(167, 139, 250, 0.1); transform: scale(1.05); z-index: 10; }
        .cell.marked { border-color: var(--primary-amber); color: var(--primary-amber); background: rgba(251, 191, 36, 0.05); }
        .cell.is-zero { border-color: var(--primary-rose); color: var(--primary-rose); }
        .cell.to-be-zero { background: rgba(251, 113, 133, 0.2); border-color: var(--primary-rose); color: transparent; }
        .cell.final-zero { background: #311; border-color: var(--primary-rose); color: var(--primary-rose); }

        .controls { display: flex; gap: 16px; margin-top: 10px; }
        button { padding: 12px 32px; border-radius: 16px; border: 1px solid var(--border-color); background: #1c1c1e; color: #fff; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; }
        button:hover:not(:disabled) { background: #2c2c2e; transform: translateY(-2px); }
        button:disabled { opacity: 0.2; cursor: not-allowed; }

        .legend { display: flex; gap: 20px; font-size: 0.7rem; color: #71717a; margin-top: 10px; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-card">
            <div id="status" class="status-text">准备开始！我们要找出所有包含 0 的行和列，并将它们全部变灰。</div>
        </div>

        <div class="matrix-container" id="matrix">
            <!-- Cells injected here -->
        </div>

        <div class="legend">
            <div class="legend-item"><div class="dot" style="background: var(--primary-amber);"></div> 记事本标记</div>
            <div class="legend-item"><div class="dot" style="background: var(--primary-rose);"></div> 发现 0</div>
            <div class="legend-item"><div class="dot" style="background: #311; border: 1px solid var(--primary-rose);"></div> 已置零</div>
        </div>

        <div class="controls">
            <button onclick="reset()">重置</button>
            <button onclick="nextStep()" id="next-btn">下一步</button>
        </div>
    </div>

    <script>
        const initialMatrix = [
            [1, 1, 1, 1],
            [1, 0, 1, 1],
            [1, 1, 1, 0]
        ];
        let matrix = JSON.parse(JSON.stringify(initialMatrix));
        const m = matrix.length;
        const n = matrix[0].length;
        
        let step = 0; 
        // Phases: 
        // 0: Check first row/col flags
        // 1: Mark interior zeros to first row/col
        // 2: Update interior cells based on marks
        // 3: Update first row/col
        let curI = 1, curJ = 1;
        let flagRow = false, flagCol = false;

        function init() {
            const container = document.getElementById('matrix');
            container.style.gridTemplateColumns = `repeat(${n}, 60px)`;
            container.innerHTML = '';
            for(let i=0; i<m; i++) {
                for(let j=0; j<n; j++) {
                    const div = document.createElement('div');
                    div.className = 'cell';
                    if (i === 0 || j === 0) div.classList.add('is-header');
                    div.id = `cell-${i}-${j}`;
                    div.innerText = matrix[i][j];
                    if (matrix[i][j] === 0) div.classList.add('is-zero');
                    container.appendChild(div);
                }
            }
            document.getElementById('next-btn').disabled = false;
        }

        function updateUI() {
            for(let i=0; i<m; i++) {
                for(let j=0; j<n; j++) {
                    const cell = document.getElementById(`cell-${i}-${j}`);
                    cell.innerText = matrix[i][j];
                    if (matrix[i][j] === 0) {
                        if (i === 0 || j === 0) cell.classList.add('marked');
                        else cell.classList.add('is-zero');
                    }
                }
            }
        }

        function nextStep() {
            const status = document.getElementById('status');
            
            if (step === 0) {
                // Check flags
                flagCol = matrix.some(row => row[0] === 0);
                flagRow = matrix[0].some(val => val === 0);
                status.innerHTML = `第 0 步：先偷偷记下。第一列原本有 0 吗？<span class="highlight">${flagCol}</span>。第一行原本有 0 吗？<span class="highlight">${flagRow}</span>。`;
                step = 1;
                return;
            }

            if (step === 1) {
                // Marking interior
                document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
                const cell = document.getElementById(`cell-${curI}-${curJ}`);
                cell.classList.add('active');

                if (matrix[curI][curJ] === 0) {
                    status.innerHTML = `扫描到内室 <span class="highlight">(${curI}, ${curJ})</span> 有怪兽！<br>跑到门口 <span class="highlight">(${curI}, 0)</span> 和房顶 <span class="highlight">(0, ${curJ})</span> 画个叉。`;
                    matrix[curI][0] = 0;
                    matrix[0][curJ] = 0;
                    updateUI();
                } else {
                    status.innerHTML = `检查内室 (${curI}, ${curJ})，这里很安全。继续看下一个。`;
                }

                curJ++;
                if (curJ >= n) { curJ = 1; curI++; }
                if (curI >= m) { step = 2; curI = 1; curJ = 1; }
                return;
            }

            if (step === 2) {
                // Updating interior
                document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
                const cell = document.getElementById(`cell-${curI}-${curJ}`);
                cell.classList.add('active');

                if (matrix[curI][0] === 0 || matrix[0][curJ] === 0) {
                    status.innerHTML = `查岗！门口或房顶有叉。内室 <span class="highlight">(${curI}, ${curJ})</span> 被封锁。`;
                    matrix[curI][curJ] = 0;
                    cell.classList.add('final-zero');
                } else {
                    status.innerHTML = `查岗！门口和房顶都干净。内室 (${curI}, ${curJ}) 保留。`;
                }

                curJ++;
                if (curJ >= n) { curJ = 1; curI++; }
                if (curI >= m) { step = 3; }
                updateUI();
                return;
            }

            if (step === 3) {
                status.innerHTML = `最后阶段：根据最开始留的便条，处理第一行和第一列。`;
                if (flagCol) for(let i=0; i<m; i++) {
                    matrix[i][0] = 0;
                    document.getElementById(`cell-${i}-0`).classList.add('final-zero');
                }
                if (flagRow) for(let j=0; j<n; j++) {
                    matrix[0][j] = 0;
                    document.getElementById(`cell-0-${j}`).classList.add('final-zero');
                }
                updateUI();
                status.innerHTML += `<br>🎉 <span class="highlight" style="color:var(--primary-emerald)">大功告成！全楼清理完毕。</span>`;
                document.getElementById('next-btn').disabled = true;
            }
        }

        function reset() {
            matrix = JSON.parse(JSON.stringify(initialMatrix));
            step = 0; curI = 1; curJ = 1;
            document.getElementById('status').innerText = "已重置，准备开始。";
            init();
        }

        init();
    </script>
</body>
</html>
