<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(20, 20, 23, 0.8);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-violet: #a78bfa;
            --primary-rose: #fb7185;
            --primary-emerald: #10b981;
            --primary-amber: #fbbf24;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); margin: 0; color: #fff; height: 100vh;
            display: flex; align-items: center; justify-content: center; overflow-y: auto;
        }

        .container { width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 40px 20px; }
        
        .status-card { 
            background: var(--card-bg); border: 1px solid var(--border-color); backdrop-blur: 12px;
            padding: 16px 24px; border-radius: 24px; width: 100%; max-width: 600px; 
            text-align: center; min-height: 80px; display: flex; align-items: center; justify-content: center;
        }
        .status-text { font-size: 0.95rem; color: #d1d1d6; line-height: 1.6; }
        .highlight { font-weight: 800; color: var(--primary-violet); }

        .row-label { font-size: 0.6rem; color: #71717a; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; letter-spacing: 0.1em; }
        
        .data-grid { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .num-box { 
            width: 55px; height: 55px; border: 1.5px solid #333; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 1.1rem; background: #111; transition: all 0.4s; position: relative;
        }
        .num-box.active { border-color: var(--primary-amber); background: rgba(251, 191, 36, 0.05); transform: translateY(-5px); }
        .idx-label { font-size: 0.6rem; color: #444; position: absolute; bottom: 2px; }

        .dp-row { display: flex; gap: 10px; justify-content: center; }
        .dp-box { 
            width: 55px; height: 55px; border: 1.5px solid #222; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; font-size: 1rem; 
            background: rgba(255,255,255,0.02); transition: all 0.5s; font-mono; font-weight: bold;
        }
        .dp-box.highlighted { border-color: var(--primary-violet); color: var(--primary-violet); background: rgba(167, 139, 250, 0.1); }
        .dp-box.final { border-color: var(--primary-emerald); color: var(--primary-emerald); background: rgba(16, 185, 129, 0.1); }

        .bag-container { display: flex; gap: 20px; margin-top: 10px; }
        .bag-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 12px 24px; border-radius: 20px; text-align: center; }
        .bag-val { font-size: 1.8rem; font-weight: 900; color: var(--primary-violet); font-mono; }
        .bag-name { font-size: 0.6rem; color: #636366; text-transform: uppercase; margin-top: 4px; font-weight: bold; }

        .controls { display: flex; gap: 16px; margin-top: 10px; }
        button { padding: 12px 32px; border-radius: 16px; border: 1px solid var(--border-color); background: #1c1c1e; color: #fff; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; }
        button:hover:not(:disabled) { background: #2c2c2e; transform: translateY(-2px); }
        button:disabled { opacity: 0.2; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-card">
            <div id="status" class="status-text">准备开始！我们要分两次扫描：先从左往右，再从右往左。</div>
        </div>

        <div style="width: 100%">
            <div class="row-label">原始数组 (nums)</div>
            <div class="data-grid" id="nums-row"></div>
        </div>

        <div style="width: 100%">
            <div class="row-label">结果清单 (ans)</div>
            <div class="dp-row" id="dp-row"></div>
        </div>

        <div class="bag-container">
            <div class="bag-card" id="left-bag-card">
                <div id="left-val" class="bag-val">1</div>
                <div class="bag-name">左侧礼物积 (left)</div>
            </div>
            <div class="bag-card" id="right-bag-card" style="opacity: 0.3">
                <div id="right-val" class="bag-val">1</div>
                <div class="bag-name">右侧礼物积 (right)</div>
            </div>
        </div>

        <div class="controls">
            <button onclick="reset()">重置</button>
            <button onclick="nextStep()" id="next-btn">下一步</button>
        </div>
    </div>

    <script>
        const nums = [1, 2, 3, 4];
        let dp = [1, 1, 1, 1];
        let phase = 'left'; // 'left' or 'right'
        let curIdx = 0;
        let leftProd = 1;
        let rightProd = 1;

        function init() {
            const numsRow = document.getElementById('nums-row');
            const dpRow = document.getElementById('dp-row');
            numsRow.innerHTML = '';
            dpRow.innerHTML = '';
            nums.forEach((n, idx) => {
                numsRow.innerHTML += `<div class="num-box" id="num-${idx}">${n}<span class="idx-label">${idx}</span></div>`;
                dpRow.innerHTML += `<div class="dp-box" id="dp-${idx}">1</div>`;
            });
            updateUI();
            document.getElementById('next-btn').disabled = false;
        }

        function updateUI() {
            nums.forEach((_, idx) => {
                const nBox = document.getElementById(`num-${idx}`);
                const dBox = document.getElementById(`dp-${idx}`);
                nBox.className = 'num-box' + (idx === curIdx ? ' active' : '');
                dBox.innerText = dp[idx];
                
                if (phase === 'left' && idx < curIdx) dBox.classList.add('highlighted');
                if (phase === 'right' && idx > curIdx) dBox.classList.add('final');
                if (phase === 'right' && idx === curIdx) dBox.classList.add('highlighted');
            });
            document.getElementById('left-val').innerText = leftProd;
            document.getElementById('right-val').innerText = rightProd;
            
            document.getElementById('left-bag-card').style.opacity = (phase === 'left') ? '1' : '0.5';
            document.getElementById('right-bag-card').style.opacity = (phase === 'right') ? '1' : '0.3';
        }

        function nextStep() {
            const status = document.getElementById('status');
            
            if (phase === 'left') {
                if (curIdx < nums.length) {
                    const n = nums[curIdx];
                    status.innerHTML = `左扫描 (第 ${curIdx} 位)：把左边的积 <span class="highlight">${leftProd}</span> 给它。<br>然后更新左积：${leftProd} × ${n} = <span class="highlight">${leftProd * n}</span>。`;
                    dp[curIdx] = leftProd;
                    leftProd *= n;
                    updateUI();
                    curIdx++;
                } else {
                    phase = 'right';
                    curIdx = nums.length - 1;
                    status.innerHTML = `左扫描完成！现在开始<span class="highlight" style="color:var(--primary-rose)">右扫描</span>。从后往前乘。`;
                    updateUI();
                }
            } else {
                if (curIdx >= 0) {
                    const n = nums[curIdx];
                    const oldVal = dp[curIdx];
                    status.innerHTML = `右扫描 (第 ${curIdx} 位)：目前的左积是 ${oldVal}，乘上右积 <span class="highlight" style="color:var(--primary-rose)">${rightProd}</span>。<br>结果：${oldVal * rightProd}。更新右积：${rightProd} × ${n} = <span class="highlight">${rightProd * n}</span>。`;
                    dp[curIdx] *= rightProd;
                    rightProd *= n;
                    updateUI();
                    curIdx--;
                } else {
                    status.innerHTML = `🎉 两次扫描完成！所有的“超级礼物”都计算好啦。`;
                    document.getElementById('next-btn').disabled = true;
                }
            }
        }

        function reset() {
            dp = [1, 1, 1, 1];
            phase = 'left';
            curIdx = 0;
            leftProd = 1;
            rightProd = 1;
            document.getElementById('status').innerText = "已重置，准备开始。";
            init();
        }

        init();
    </script>
</body>
</html>
