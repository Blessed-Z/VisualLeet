<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>32. 最长有效括号 - 可视化演示</title>
    <style>
        :root {
            --primary-purple: #a855f7;
            --emerald-green: #10b981;
            --rose-red: #f43f5e;
            --amber-yellow: #f59e0b;
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --border-color: #30363d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            max-width: 800px;
            width: 100%;
            border: 1px solid var(--border-color);
        }

        h2 {
            text-align: center;
            color: var(--primary-purple);
            margin-bottom: 25px;
            font-weight: 300;
        }

        .visualization-area {
            display: flex;
            gap: 40px;
            margin-bottom: 30px;
        }

        .string-area {
            flex: 2;
        }

        .stack-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .char-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .char-box {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 20px;
            font-family: monospace;
            transition: all 0.3s;
            position: relative;
        }

        .char-box.active { border: 2px solid var(--amber-yellow); transform: scale(1.1); }
        .char-box.matched { background: var(--emerald-green); color: black; border-color: var(--emerald-green); }

        .idx-label { position: absolute; top: -20px; font-size: 10px; color: #8b949e; }

        .stack-container {
            width: 80px;
            height: 250px;
            border: 3px solid var(--border-color);
            border-top: none;
            border-radius: 0 0 10px 10px;
            display: flex;
            flex-direction: column-reverse;
            padding: 5px;
            background: rgba(0,0,0,0.2);
        }

        .stack-item {
            height: 30px;
            background: var(--primary-purple);
            margin: 2px 0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .status-text {
            height: 60px;
            text-align: center;
            font-size: 18px;
            color: var(--amber-yellow);
            margin: 15px 0;
            line-height: 1.5;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: var(--primary-purple);
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }
        button:disabled { background: #30363d; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h2>32. 最长有效括号 (Longest Valid Parentheses)</h2>
    
    <div class="visualization-area">
        <div class="string-area">
            <div class="char-row" id="charRow"></div>
            <div class="status-text" id="status">点击“下一步”开始</div>
        </div>
        
        <div class="stack-area">
            <div class="stack-container" id="stackContainer"></div>
            <div style="margin-top: 10px;">记忆栈</div>
        </div>
    </div>

    <div class="controls">
        <button id="resetBtn">重置</button>
        <button id="nextBtn">下一步</button>
    </div>
</div>

<script>
    const s = "(()())";
    const n = s.length;
    let stack = [-1];
    let i = 0;
    let ans = 0;

    function init() {
        const charRow = document.getElementById('charRow');
        charRow.innerHTML = '';
        s.split('').forEach((char, idx) => {
            const box = document.createElement('div');
            box.className = 'char-box';
            box.id = `char-${idx}`;
            box.textContent = char;
            
            const label = document.createElement('div');
            label.className = 'idx-label';
            label.textContent = idx;
            box.appendChild(label);
            
            charRow.appendChild(box);
        });

        stack = [-1];
        i = 0;
        ans = 0;
        updateStackView();
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('status').textContent = '初始化，地基设为 -1';
    }

    function updateStackView() {
        const container = document.getElementById('stackContainer');
        container.innerHTML = '';
        stack.forEach(val => {
            const item = document.createElement('div');
            item.className = 'stack-item';
            item.textContent = val;
            container.appendChild(item);
        });
    }

    function next() {
        if (i >= n) return;

        const char = s[i];
        document.querySelectorAll('.char-box').forEach(b => b.classList.remove('active'));
        document.getElementById(`char-${i}`).classList.add('active');

        const status = document.getElementById('status');

        if (char === '(') {
            stack.push(i);
            status.textContent = `遇到 '('，将下标 ${i} 压入栈。`;
        } else {
            stack.pop();
            if (stack.length === 0) {
                stack.push(i);
                status.textContent = `遇到 ')'，但没找到配对的 '('。将新地基设为 ${i}。`;
            } else {
                const currentLen = i - stack[stack.length - 1];
                ans = Math.max(ans, currentLen);
                status.textContent = `遇到 ')'，配对成功！当前有效长度 ${i} - ${stack[stack.length - 1]} = ${currentLen}。最大纪录：${ans}`;
                
                // Highlight matched range (visual only)
                for (let k = stack[stack.length - 1] + 1; k <= i; k++) {
                    document.getElementById(`char-${k}`).classList.add('matched');
                }
            }
        }

        updateStackView();
        i++;
        if (i >= n) {
            document.getElementById('nextBtn').disabled = true;
            status.textContent = `遍历结束！最长有效括号长度为: ${ans}`;
        }
    }

    document.getElementById('nextBtn').addEventListener('click', next);
    document.getElementById('resetBtn').addEventListener('click', init);

    init();
</script>

</body>
</html>
