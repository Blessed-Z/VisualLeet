<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --purple: #8b5cf6;
            --rose: #ec4899;
            --emerald: #10b981;
            --amber: #f59e0b;
            --bg: #0f172a;
            --box-bg: rgba(30, 41, 59, 0.7);
        }
        body { font-family: "Segoe UI", sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 800px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 30px; }
        
        .status-card {
            background: rgba(30, 41, 59, 0.5); padding: 15px 25px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center; width: 80%; color: var(--amber); font-size: 1.1rem;
        }

        .jump-container {
            width: 100%; height: 250px; background: var(--box-bg); border: 2px solid #475569;
            border-radius: 20px; position: relative; padding: 60px 20px; display: flex; align-items: flex-end; justify-content: space-around;
        }

        .brick {
            width: 50px; height: 50px; background: #334155; border: 2px solid #475569;
            border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; transition: all 0.5s;
        }
        .brick.active { border-color: var(--amber); background: rgba(245, 158, 11, 0.1); }
        .brick.reachable { background: rgba(139, 92, 246, 0.1); border-color: var(--purple); }
        .brick.current { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); border-color: var(--emerald); }
        .brick .energy { font-weight: bold; font-size: 1.2rem; }
        .brick .idx { position: absolute; bottom: -25px; font-size: 0.7rem; color: #64748b; }

        .reach-line {
            position: absolute; height: 4px; background: var(--purple); top: 40px; left: 35px;
            transition: width 0.5s; border-radius: 2px; box-shadow: 0 0 10px var(--purple);
        }
        .reach-label { position: absolute; top: -25px; right: 0; color: var(--purple); font-size: 0.8rem; font-weight: bold; }

        .controls { display: flex; gap: 15px; }
        button {
            padding: 12px 25px; border-radius: 10px; border: none; background: #334155; color: white;
            font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        button:hover:not(:disabled) { background: #475569; transform: translateY(-2px); }
        button.primary { background: var(--purple); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-card" id="status">马里奥准备出发！</div>
        
        <div class="jump-container" id="jump-area">
            <div class="reach-line" id="reach-line" style="width: 0;">
                <span class="reach-label">望远镜最远可达点</span>
            </div>
            <!-- Bricks will be injected here -->
        </div>

        <div class="controls">
            <button onclick="reset()">重置</button>
            <button class="primary" onclick="nextStep()" id="next-btn">走一步</button>
        </div>
    </div>

    <script>
        const nums = [2, 3, 1, 1, 4];
        let step = 0;
        let maxReach = 0;
        const brickWidth = 60; // Approximate

        function init() {
            const area = document.getElementById('jump-area');
            area.querySelectorAll('.brick').forEach(b => b.remove());
            nums.forEach((n, i) => {
                const b = document.createElement('div');
                b.className = 'brick';
                b.id = `brick-${i}`;
                b.innerHTML = `<span class="energy">${n}</span><span class="idx">${i}</span>`;
                area.appendChild(b);
            });
            updateReach(0);
        }

        function updateReach(val) {
            const line = document.getElementById('reach-line');
            // Assuming 5 bricks spread evenly in jump-container (100%)
            // A simple approximation for visualization
            const percentage = (val / (nums.length - 1)) * 88; // 88% looks about right for the scale
            line.style.width = `${percentage}%`;
        }

        function nextStep() {
            if (step >= nums.length) return;
            const status = document.getElementById('status');
            const energy = nums[step];

            // Highlight current
            document.querySelectorAll('.brick').forEach(b => b.classList.remove('current'));
            const currentBrick = document.getElementById(`brick-${step}`);
            currentBrick.classList.add('current');

            if (step > maxReach) {
                status.innerText = `哦不！第 ${step} 块砖超出了望远镜范围，马里奥掉下去了！`;
                document.getElementById('next-btn').disabled = true;
                return;
            }

            const canReachFromHere = step + energy;
            if (canReachFromHere > maxReach) {
                maxReach = canReachFromHere;
                status.innerText = `在第 ${step} 块砖上，望远镜看到了最远 ${maxReach}！`;
                updateReach(Math.min(maxReach, nums.length - 1));
            } else {
                status.innerText = `在第 ${step} 块砖上，虽然能跳到 ${canReachFromHere}，但没超过之前的纪录。`;
            }

            // Mark reachable bricks
            for(let i=0; i<=maxReach && i<nums.length; i++) {
                document.getElementById(`brick-${i}`).classList.add('reachable');
            }

            step++;
            if (maxReach >= nums.length - 1) {
                status.innerText += " 望远镜已经看到终点啦！";
                if (step === nums.length) document.getElementById('next-btn').disabled = true;
            }
        }

        function reset() {
            step = 0; maxReach = 0;
            document.getElementById('next-btn').disabled = false;
            document.getElementById('status').innerText = "马里奥准备出发！";
            init();
        }

        init();
    </script>
</body>
</html>
