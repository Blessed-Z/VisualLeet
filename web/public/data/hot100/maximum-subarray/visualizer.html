<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(20, 20, 23, 0.8);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-violet: #a78bfa;
            --primary-rose: #fb7185;
            --primary-emerald: #10b981;
            --primary-amber: #fbbf24;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); margin: 0; color: #fff; height: 100vh;
            display: flex; align-items: center; justify-content: center; overflow-y: auto;
        }

        .container { width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 40px 20px; }
        
        .status-card { 
            background: var(--card-bg); border: 1px solid var(--border-color); backdrop-blur: 12px;
            padding: 16px 24px; border-radius: 24px; width: 100%; max-width: 600px; 
            text-align: center; min-height: 80px; display: flex; align-items: center; justify-content: center;
        }
        .status-text { font-size: 0.95rem; color: #d1d1d6; line-height: 1.6; }
        .highlight { font-weight: 800; color: var(--primary-violet); }

        .row-label { font-size: 0.65rem; color: #71717a; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; letter-spacing: 0.1em; }
        
        .data-grid { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
        .num-box { 
            width: 50px; height: 50px; border: 1px solid #3f3f46; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; font-size: 1.1rem; 
            background: #18181b; transition: all 0.4s; position: relative; 
        }
        .num-box.active { border-color: var(--primary-violet); background: rgba(167, 139, 250, 0.1); transform: translateY(-5px); z-index: 10; }
        
        .dp-grid { display: flex; gap: 8px; justify-content: center; }
        .dp-box { 
            width: 50px; height: 50px; border: 1px solid #27272a; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; font-size: 1rem; 
            background: rgba(255,255,255,0.02); transition: all 0.5s; font-mono;
        }
        .dp-box.filled { border-color: var(--primary-emerald); color: var(--primary-emerald); background: rgba(16, 185, 129, 0.05); }
        .dp-box.negative { border-color: var(--primary-rose); color: var(--primary-rose); }
        
        .stats { display: flex; gap: 15px; width: 100%; max-width: 600px; margin-top: 10px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 15px; border-radius: 20px; text-align: center; flex: 1; }
        .stat-val { font-size: 1.8rem; font-weight: 900; color: var(--primary-amber); font-mono; }
        .stat-name { font-size: 0.65rem; color: #636366; text-transform: uppercase; margin-top: 4px; font-weight: bold; }

        .controls { display: flex; gap: 16px; margin-top: 10px; }
        button { padding: 12px 32px; border-radius: 16px; border: 1px solid var(--border-color); background: #1c1c1e; color: #fff; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; }
        button:hover:not(:disabled) { background: #2c2c2e; transform: translateY(-2px); }
        button:disabled { opacity: 0.2; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-card">
            <div id="status" class="status-text">准备开始探险！我们要找一段连续路径，让金币总数最大。</div>
        </div>

        <div style="width: 100%">
            <div class="row-label">原始数组 (nums)</div>
            <div class="data-grid" id="nums-row"></div>
        </div>

        <div style="width: 100%">
            <div class="row-label">成绩本 (dp[i])</div>
            <div class="dp-grid" id="dp-row"></div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div id="max-val" class="stat-val">---</div>
                <div class="stat-name">全局最高分 (ANS)</div>
            </div>
        </div>

        <div class="controls">
            <button onclick="reset()">重置</button>
            <button onclick="nextStep()" id="next-btn">下一步</button>
        </div>
    </div>

    <script>
        const nums = [-2, 1, -3, 4, -1, 2, 1, -5, 4];
        let i = 0;
        let dp = new Array(nums.length).fill(null);
        let globalMax = -Infinity;

        function init() {
            const numsRow = document.getElementById('nums-row');
            const dpRow = document.getElementById('dp-row');
            numsRow.innerHTML = '';
            dpRow.innerHTML = '';
            
            nums.forEach((n, idx) => {
                numsRow.innerHTML += `<div class="num-box" id="num-${idx}">${n}</div>`;
                dpRow.innerHTML += `<div class="dp-box" id="dp-${idx}">?</div>`;
            });
            updateUI();
            document.getElementById('next-btn').disabled = false;
        }

        function updateUI() {
            nums.forEach((_, idx) => {
                const nBox = document.getElementById(`num-${idx}`);
                const dBox = document.getElementById(`dp-${idx}`);
                
                nBox.className = 'num-box' + (idx === i ? ' active' : '');
                
                if (dp[idx] !== null) {
                    dBox.innerText = dp[idx];
                    dBox.className = 'dp-box filled' + (dp[idx] < 0 ? ' negative' : '');
                } else {
                    dBox.innerText = '?';
                    dBox.className = 'dp-box';
                }
            });
            document.getElementById('max-val').innerText = globalMax === -Infinity ? '---' : globalMax;
        }

        function nextStep() {
            if (i >= nums.length) return;
            const status = document.getElementById('status');
            const val = nums[i];

            if (i === 0) {
                dp[0] = val;
                status.innerHTML = `第一格没有“过去”。成绩就是它自己：<span class="highlight">${val}</span>。`;
            } else {
                const prevScore = dp[i-1];
                if (prevScore < 0) {
                    dp[i] = val;
                    status.innerHTML = `前一格成绩是 <span style="color:var(--primary-rose)">${prevScore}</span> (负数)！<br>它会拖累我，果断舍弃。本格从 <span class="highlight">${val}</span> 重新开始！`;
                } else {
                    dp[i] = prevScore + val;
                    status.innerHTML = `前一格成绩是 <span style="color:var(--primary-emerald)">${prevScore}</span> (正数)！<br>加上它让我更强！本格成绩：${prevScore} + ${val} = <span class="highlight">${dp[i]}</span>。`;
                }
            }

            globalMax = Math.max(globalMax, dp[i]);
            updateUI();
            i++;

            if (i === nums.length) {
                status.innerHTML = `🎉 所有的路都走完啦！我们探险到的最高光时刻是：<span class="highlight" style="color:var(--primary-amber)">${globalMax}</span>。`;
                document.getElementById('next-btn').disabled = true;
            }
        }

        function reset() {
            i = 0;
            dp = new Array(nums.length).fill(null);
            globalMax = -Infinity;
            document.getElementById('status').innerText = "已重置，准备开始。";
            init();
        }

        init();
    </script>
</body>
</html>
