<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>394. 字符串解码 可视化</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --primary-purple: #9d4edd;
            --rose-red: #ff006e;
            --emerald-green: #06d6a0;
            --amber: #ffbe0b;
            --text-color: #e6edf3;
            --node-bg: #161b22;
        }

        html, body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow-x: hidden; overflow-y: auto;
        }

        body { display: flex; flex-direction: column; align-items: center; padding: 40px 0; }

        .container {
            width: 95%; max-width: 1100px;
            display: flex; flex-direction: column; gap: 20px; padding-bottom: 100px;
        }

        .status-box {
            background-color: var(--node-bg); padding: 20px; border-radius: 12px;
            border-left: 5px solid var(--amber); min-height: 80px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 1.1em; box-shadow: 0 4px 15px rgba(0,0,0,0.3); line-height: 1.6;
        }

        .main-content { display: grid; grid-template-columns: 1fr 400px; gap: 30px; min-height: 500px; }

        /* Left Side: Working Area */
        .viz-panel {
            background: #1c2128; border: 1px solid #30363d; border-radius: 20px;
            padding: 30px; position: relative; display: flex; flex-direction: column; align-items: center;
        }

        .scroll-display {
            width: 100%; padding: 20px; background: #0d1117; border: 2px solid #30363d;
            border-radius: 12px; margin-bottom: 30px; font-family: monospace; font-size: 1.5em;
            display: flex; flex-wrap: wrap; gap: 5px; justify-content: center;
        }
        .char-token {
            width: 30px; height: 40px; border: 1px solid #30363d; border-radius: 4px;
            display: flex; align-items: center; justify-content: center; transition: all 0.3s;
        }
        .char-token.active { border-color: var(--amber); background: rgba(255, 190, 11, 0.1); transform: translateY(-5px); }
        .char-token.processed { opacity: 0.3; }

        .current-vars {
            display: flex; gap: 20px; width: 100%; margin-top: auto;
        }
        .var-box {
            flex: 1; padding: 15px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid #30363d; border-radius: 15px; text-align: center;
        }
        .var-label { font-size: 0.7em; color: #8b949e; text-transform: uppercase; margin-bottom: 5px; }
        .var-val { font-family: monospace; font-size: 1.5em; font-weight: bold; color: var(--amber); }

        /* Right Side: Stacks */
        .stacks-area { display: flex; gap: 20px; height: 100%; }
        .stack-container {
            display: flex; flex-direction: column-reverse; align-items: center;
            flex: 1; height: 400px; border: 3px solid #30363d; border-top: none;
            border-radius: 0 0 15px 15px; background: rgba(22, 27, 34, 0.5);
            padding: 10px; position: relative;
        }
        .stack-title { font-size: 0.7em; color: #8b949e; text-align: center; margin-bottom: 10px; font-weight: bold; }

        .stack-item {
            width: 100%; min-height: 35px; margin-bottom: 4px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9em; font-weight: bold; font-family: monospace;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            animation: slideDown 0.3s ease-out;
            word-break: break-all; padding: 5px;
        }
        @keyframes slideDown { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .str-stack .stack-item { background: var(--primary-purple); color: white; }
        .num-stack .stack-item { background: var(--emerald-green); color: black; }

        .zoom-controls { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 100; }
        .zoom-btn {
            width: 35px; height: 35px; border-radius: 8px; background: rgba(22, 27, 34, 0.8);
            border: 1px solid #30363d; color: var(--text-color); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }

        .controls { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        button {
            padding: 12px 35px; border-radius: 35px; border: none; cursor: pointer;
            font-weight: bold; transition: all 0.3s; font-size: 1.1em;
        }
        .btn-next { background-color: var(--emerald-green); color: #000; }
        .btn-reset { background-color: #30363d; color: var(--text-color); }
        button:disabled { opacity: 0.3; }

        .highlight-text { font-weight: bold; color: var(--amber); }
    </style>
</head>
<body>
    <div class="container">
        <h1>📜 字符串解码：魔法卷轴演示</h1>
        <div class="status-box">
            <div id="status">准备解码。卷轴内容: <span class="highlight-text">"3[a]2[bc]"</span></div>
            <div id="sub-status" style="font-size: 0.85em; color: #8b949e; margin-top: 8px;">数字代表重复次数，括号代表嵌套范围。</div>
        </div>

        <div class="main-content">
            <div class="viz-panel" id="viz">
                <div class="zoom-controls">
                    <button class="zoom-btn" onclick="changeZoom(1.1)">+</button>
                    <button class="zoom-btn" onclick="changeZoom(0.9)">-</button>
                    <button class="zoom-btn" onclick="resetZoom()">⟲</button>
                </div>
                
                <div class="scroll-display" id="input-container"></div>

                <div class="current-vars">
                    <div class="var-box">
                        <div class="var-label">当前倍数 (num)</div>
                        <div class="var-val" id="num-val">0</div>
                    </div>
                    <div class="var-box">
                        <div class="var-label">当前零件 (res)</div>
                        <div class="var-val" id="res-val">""</div>
                    </div>
                </div>
            </div>

            <div class="stacks-area">
                <div style="flex: 1;">
                    <div class="stack-title">零件口袋 (stack1)</div>
                    <div class="stack-container str-stack" id="stack1-view"></div>
                </div>
                <div style="flex: 1;">
                    <div class="stack-title">倍数口袋 (stack2)</div>
                    <div class="stack-container num-stack" id="stack2-view"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-reset" onclick="reset()">重置</button>
            <button class="btn-next" id="next-btn" onclick="nextStep()">下一步</button>
        </div>
    </div>

    <script>
        const inputStr = "3[a]2[bc]";
        let steps = [];
        let currentStep = 0;
        let zoomFactor = 1.0;

        function generateSteps() {
            steps = [];
            let stack1 = []; // strings
            let stack2 = []; // nums
            let num = 0;
            let res = '';
            
            steps.push({ type: 'INIT', stack1: [], stack2: [], num: 0, res: '', charIdx: -1 });

            for (let i = 0; i < inputStr.length; i++) {
                const ch = inputStr[i];
                if (!isNaN(parseInt(ch))) {
                    num = num * 10 + parseInt(ch);
                    steps.push({ type: 'NUM', ch, stack1: [...stack1], stack2: [...stack2], num, res, charIdx: i });
                } else if (ch === '[') {
                    stack1.push(res);
                    stack2.push(num);
                    steps.push({ type: 'PUSH', ch, stack1: [...stack1], stack2: [...stack2], num, res, charIdx: i });
                    res = '';
                    num = 0;
                    steps.push({ type: 'CLEAR', ch, stack1: [...stack1], stack2: [...stack2], num, res, charIdx: i });
                } else if (ch === ']') {
                    const prevRes = stack1.pop();
                    const repeat = stack2.pop();
                    const currentRes = res;
                    res = prevRes + repeat * res;
                    steps.push({ type: 'POP', ch, stack1: [...stack1], stack2: [...stack2], num, res, charIdx: i, prevRes, repeat, currentRes });
                } else {
                    res += ch;
                    steps.push({ type: 'CHAR', ch, stack1: [...stack1], stack2: [...stack2], num, res, charIdx: i });
                }
            }
            steps.push({ type: 'DONE', stack1: [...stack1], stack2: [...stack2], num, res, charIdx: -1 });
        }

        function render() {
            const step = steps[currentStep];
            if (!step) return;

            document.getElementById('viz').style.transform = `scale(${zoomFactor})`;

            // Render Input
            const inputContainer = document.getElementById('input-container');
            inputContainer.innerHTML = '';
            for (let i = 0; i < inputStr.length; i++) {
                const div = document.createElement('div');
                div.className = 'char-token';
                if (i === step.charIdx) div.className += ' active';
                if (i < step.charIdx) div.className += ' processed';
                div.innerText = inputStr[i];
                inputContainer.appendChild(div);
            }

            // Render Stacks
            const s1View = document.getElementById('stack1-view');
            const s2View = document.getElementById('stack2-view');
            s1View.innerHTML = ''; s2View.innerHTML = '';
            step.stack1.forEach(v => {
                const div = document.createElement('div');
                div.className = 'stack-item';
                div.innerText = v === '' ? '""' : v;
                s1View.appendChild(div);
            });
            step.stack2.forEach(v => {
                const div = document.createElement('div');
                div.className = 'stack-item';
                div.innerText = v;
                s2View.appendChild(div);
            });

            // Update Vars
            document.getElementById('num-val').innerText = step.num;
            document.getElementById('res-val').innerText = `"${step.res}"`;

            const status = document.getElementById('status');
            const subStatus = document.getElementById('sub-status');

            if (step.type === 'INIT') {
                status.innerHTML = `准备读取卷轴...`;
                subStatus.innerText = "清空所有口袋，准备出发。";
            } else if (step.type === 'NUM') {
                status.innerHTML = `读取到数字: <span class="highlight-text">${step.ch}</span>`;
                subStatus.innerText = `更新当前的倍数为 ${step.num}。`;
            } else if (step.type === 'PUSH') {
                status.innerHTML = `遇到 <span class="highlight-text">'['</span>，进入深层套娃。`;
                subStatus.innerText = `把目前的进度 "${step.res}" 和倍数 ${step.num} 存入口袋保护起来。`;
            } else if (step.type === 'CLEAR') {
                status.innerHTML = `重置局部变量。`;
                subStatus.innerText = `清空当前倍数和零件，开始拼凑括号内的内容。`;
            } else if (step.type === 'CHAR') {
                status.innerHTML = `读取到字母: <span style="color:var(--emerald-green); font-weight:bold;">'${step.ch}'</span>`;
                subStatus.innerText = `把它接在当前零件 "${step.res.slice(0,-1)}" 的后面。`;
            } else if (step.type === 'POP') {
                status.innerHTML = `遇到 <span class="highlight-text">']'</span>，套娃解开一层！`;
                subStatus.innerHTML = `取出倍数 <span class="highlight-text">${step.repeat}</span>，让零件 "${step.currentRes}" 重复，并接在之前的进度 "${step.prevRes}" 后面。`;
            } else if (step.type === 'DONE') {
                status.innerHTML = `🎉 <b>解码大功告成！</b>`;
                subStatus.innerHTML = `最终结果为: <span class="highlight-text">"${step.res}"</span>`;
                document.getElementById('next-btn').disabled = true;
            }
        }

        function nextStep() {
            if (currentStep < steps.length - 1) {
                currentStep++;
                render();
            }
        }

        function changeZoom(delta) { zoomFactor *= delta; render(); }
        function resetZoom() { zoomFactor = 1.0; render(); }
        function reset() { currentStep = 0; document.getElementById('next-btn').disabled = false; render(); }

        generateSteps();
        window.onload = render;
    </script>
</body>
</html>
