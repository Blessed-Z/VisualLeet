<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #09090b; margin: 0; padding: 20px; color: #fff; overflow-x: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        .array-view { display: flex; gap: 8px; justify-content: center; margin-top: 40px; min-height: 60px; }
        .num-box { width: 45px; height: 45px; border: 1px solid #3f3f46; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; background: #18181b; transition: all 0.4s; position: relative; }
        
        .is-fixed { border-color: #a78bfa; background: rgba(167, 139, 250, 0.1); transform: translateY(-5px); }
        .is-l { border-color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
        .is-r { border-color: #fb7185; background: rgba(251, 113, 133, 0.1); }
        .is-match { border-color: #10b981; background: rgba(16, 185, 129, 0.2); box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }

        .pointer-label { position: absolute; top: -25px; font-size: 0.6rem; font-weight: bold; text-transform: uppercase; }
        
        .status-card { background: #18181b; border: 1px solid #27272a; padding: 15px 25px; border-radius: 20px; width: 100%; max-width: 550px; text-align: center; min-height: 70px; display: flex; align-items: center; justify-content: center; }
        .status-text { font-size: 0.85rem; color: #a1a1aa; line-height: 1.6; }
        .highlight { font-weight: bold; }

        .results-area { width: 100%; max-width: 550px; margin-top: 10px; }
        .res-title { font-size: 0.7rem; color: #71717a; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
        .res-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .res-item { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: #10b981; padding: 4px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; }

        .controls { display: flex; gap: 12px; margin-top: 10px; }
        button { padding: 10px 28px; border-radius: 14px; border: 1px solid #27272a; background: #18181b; color: #e4e4e7; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
        button:hover { background: #27272a; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-card">
            <div id="status" class="status-text">准备开始！先对数组排序：[-4, -1, -1, 0, 1, 2]</div>
        </div>

        <div class="array-view" id="array-container"></div>

        <div class="results-area">
            <div class="res-title">已找到的三剑客组合:</div>
            <div id="res-list" class="res-list"></div>
        </div>

        <div class="controls">
            <button onclick="reset()">重置</button>
            <button onclick="nextStep()" id="next-btn">下一步</button>
        </div>
    </div>

    <script>
        const nums = [-4, -1, -1, 0, 1, 2]; // 预先排序好的
        let i = 0;
        let L = 1;
        let R = nums.length - 1;
        const results = [];

        function init() {
            const container = document.getElementById('array-container');
            container.innerHTML = '';
            nums.forEach((n, idx) => {
                const div = document.createElement('div');
                div.className = 'num-box';
                div.id = `box-${idx}`;
                div.innerText = n;
                container.appendChild(div);
            });
            document.getElementById('res-list').innerHTML = '';
            updateUI();
            document.getElementById('next-btn').disabled = false;
        }

        function updateUI() {
            document.querySelectorAll('.num-box').forEach((box, idx) => {
                box.className = 'num-box';
                box.innerHTML = nums[idx];
                
                if (idx === i) {
                    box.classList.add('is-fixed');
                    box.innerHTML += '<span class="pointer-label" style="color:#a78bfa">固定</span>';
                } else if (idx === L) {
                    box.classList.add('is-l');
                    box.innerHTML += '<span class="pointer-label" style="color:#fbbf24">左指针</span>';
                } else if (idx === R) {
                    box.classList.add('is-r');
                    box.innerHTML += '<span class="pointer-label" style="color:#fb7185">右指针</span>';
                }
            });
        }

        function nextStep() {
            const status = document.getElementById('status');
            
            if (i >= nums.length - 2) {
                status.innerHTML = "🎉 所有的组合都找完啦！";
                document.getElementById('next-btn').disabled = true;
                return;
            }

            const sum = nums[i] + nums[L] + nums[R];
            
            if (sum === 0) {
                status.innerHTML = `<span style="color:#10b981">找到了！</span> ${nums[i]} + ${nums[L]} + ${nums[R]} = 0。`;
                addResult([nums[i], nums[L], nums[R]]);
                document.getElementById(`box-${i}`).classList.add('is-match');
                document.getElementById(`box-${L}`).classList.add('is-match');
                document.getElementById(`box-${R}`).classList.add('is-match');
                
                // Simulate skipping duplicates and moving
                L++;
                R--;
                if (L >= R) moveI();
            } else if (sum < 0) {
                status.innerHTML = `当前总和 ${sum} <span class="highlight">< 0</span>，太小了。左指针向右移。`;
                L++;
                if (L >= R) moveI();
            } else {
                status.innerHTML = `当前总和 ${sum} <span class="highlight">> 0</span>，太大了。右指针向左移。`;
                R--;
                if (L >= R) moveI();
            }

            updateUI();
        }

        function moveI() {
            i++;
            // Simple duplicate skip for i in viz
            while (i < nums.length - 2 && nums[i] === nums[i-1]) i++;
            L = i + 1;
            R = nums.length - 1;
        }

        function addResult(arr) {
            const resList = document.getElementById('res-list');
            const div = document.createElement('div');
            div.className = 'res-item';
            div.innerText = `[${arr.join(', ')}]`;
            resList.appendChild(div);
        }

        function reset() {
            i = 0; L = 1; R = nums.length - 1;
            document.getElementById('status').innerText = "已重置，准备开始。";
            init();
        }

        init();
    </script>
</body>
</html>
