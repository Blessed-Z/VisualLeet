<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #09090b; margin: 0; padding: 20px; color: #fff; overflow-x: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .input-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; min-height: 60px; }
        .word-box { padding: 8px 16px; border: 1px solid #3f3f46; border-radius: 12px; background: #18181b; font-size: 0.9rem; transition: all 0.4s; position: relative; }
        .active { border-color: #a78bfa; background: rgba(167, 139, 250, 0.1); transform: scale(1.1); box-shadow: 0 0 15px rgba(167, 139, 250, 0.3); }
        .processed { opacity: 0.3; transform: scale(0.8); }
        
        .storage-area { width: 100%; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-top: 20px; }
        .bucket { border: 1px dashed #3f3f46; border-radius: 16px; padding: 12px; min-height: 100px; transition: all 0.3s; }
        .bucket-active { border-color: #10b981; background: rgba(16, 185, 129, 0.05); }
        .bucket-label { font-[10px] font-mono text-zinc-500 mb-2 uppercase tracking-tighter; border-bottom: 1px solid #27272a; padding-bottom: 4px; }
        .bucket-items { display: flex; flex-wrap: wrap; gap: 6px; }
        .mini-word { font-size: 0.75rem; background: #27272a; padding: 2px 8px; rounded: 6px; border: 1px solid #3f3f46; }

        .status-card { background: #18181b; border: 1px solid #27272a; padding: 12px 20px; border-radius: 16px; width: 100%; max-width: 500px; text-align: center; }
        .status-text { font-size: 0.85rem; color: #a1a1aa; }
        .highlight-text { color: #a78bfa; font-weight: bold; }

        .controls { display: flex; gap: 12px; }
        button { padding: 8px 20px; border-radius: 10px; border: 1px solid #27272a; background: #18181b; color: #e4e4e7; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
        button:hover { background: #27272a; border-color: #3f3f46; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-card">
            <div id="status" class="status-text">准备开始！我们要给单词找家人。</div>
        </div>
        
        <div class="input-row" id="input-area"></div>

        <div class="controls">
            <button onclick="reset()" id="reset-btn">重置</button>
            <button onclick="nextStep()" id="next-btn">下一步</button>
        </div>

        <div class="storage-area" id="storage"></div>
    </div>

    <script>
        const words = ["eat", "tea", "tan", "ate", "nat", "bat"];
        let currentIndex = 0;
        const hashMap = {}; // key: sortedWord, value: [originalWords]

        function init() {
            const inputArea = document.getElementById('input-area');
            inputArea.innerHTML = '';
            words.forEach((w, i) => {
                const div = document.createElement('div');
                div.className = 'word-box';
                div.id = `word-${i}`;
                div.innerText = w;
                inputArea.appendChild(div);
            });
            document.getElementById('storage').innerHTML = '';
            document.getElementById('next-btn').disabled = false;
        }

        function nextStep() {
            if (currentIndex >= words.length) return;

            // 1. Highlight current word
            document.querySelectorAll('.word-box').forEach(el => el.classList.remove('active'));
            const word = words[currentIndex];
            const wordEl = document.getElementById(`word-${currentIndex}`);
            wordEl.classList.add('active');

            // 2. Sort the word
            const sorted = word.split('').sort().join('');
            const status = document.getElementById('status');
            status.innerHTML = `正在给 <span class="highlight-text">${word}</span> 拍标准照... 得到照片: <span class="highlight-text">${sorted}</span>`;

            // 3. Find or create bucket
            setTimeout(() => {
                if (!hashMap[sorted]) {
                    hashMap[sorted] = [];
                    createBucket(sorted);
                }
                
                hashMap[sorted].push(word);
                wordEl.classList.add('processed');
                addToBucket(sorted, word);
                
                status.innerHTML = `找到了！把 <span class="highlight-text">${word}</span> 存入标签为 <span class="highlight-text">${sorted}</span> 的口袋中。`;
                currentIndex++;

                if (currentIndex === words.length) {
                    status.innerHTML = "🎉 所有单词都分好组啦！大获全胜！";
                    document.getElementById('next-btn').disabled = true;
                }
            }, 600);
        }

        function createBucket(key) {
            const storage = document.getElementById('storage');
            const div = document.createElement('div');
            div.className = 'bucket';
            div.id = `bucket-${key}`;
            div.innerHTML = `<div class="bucket-label">标签: ${key}</div><div class="bucket-items" id="items-${key}"></div>`;
            storage.appendChild(div);
        }

        function addToBucket(key, word) {
            const itemsDiv = document.getElementById(`items-${key}`);
            const span = document.createElement('div');
            span.className = 'mini-word';
            span.innerText = word;
            itemsDiv.appendChild(span);
            
            const bucket = document.getElementById(`bucket-${key}`);
            bucket.classList.add('bucket-active');
            setTimeout(() => bucket.classList.remove('bucket-active'), 500);
        }

        function reset() {
            currentIndex = 0;
            for(let k in hashMap) delete hashMap[k];
            document.getElementById('status').innerText = "已重置，准备开始。";
            init();
        }

        init();
    </script>
</body>
</html>
