<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二叉树展开为链表可视化</title>
    <style>
        body {
            background-color: #0d1117;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto;
        }
        #container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 20px;
            flex-wrap: wrap;
            position: relative;
        }
        #viz-area {
            flex: 2;
            min-width: 600px;
            height: 600px;
            background-color: #161b22;
            border-radius: 12px;
            padding: 20px;
            position: relative;
            border: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #sidebar {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        #stack-container, #status-container {
            background-color: #161b22;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            border: 1px solid #30363d;
        }
        #stack-container { flex: 1; }
        #status-container { flex: 1; }
        
        h3 { margin-top: 0; color: #a855f7; }
        
        #tree-svg {
            width: 100%;
            height: 100%;
            flex-grow: 1;
        }
        
        .node circle {
            fill: #1e293b;
            stroke: #475569;
            stroke-width: 2px;
            transition: all 0.5s ease;
        }
        .node text {
            fill: #e2e8f0;
            font-size: 14px;
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none;
        }
        .node.active circle {
            stroke: #f43f5e;
            stroke-width: 4px;
            fill: #4c0519;
        }
        .node.flattened circle {
            stroke: #10b981;
            stroke-width: 2px;
            fill: #064e3b;
        }
        .link {
            stroke: #475569;
            stroke-width: 2px;
            fill: none;
            transition: all 0.5s ease;
        }
        .link.hidden {
            opacity: 0;
            stroke-dasharray: 5, 5;
        }
        .link.new-link {
            stroke: #a855f7;
            stroke-width: 3px;
        }
        
        #controls {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            background-color: #a855f7;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: #9333ea; }
        button:disabled { background-color: #30363d; color: #8b949e; cursor: not-allowed; }
        
        #status-text {
            margin-top: 10px;
            font-size: 1.1em;
            color: #f43f5e;
            text-align: center;
            min-height: 1.5em;
        }
        
        /* 缩放控制栏 */
        #zoom-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 100;
        }
        .zoom-btn {
            width: 36px;
            height: 36px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background-color: #30363d;
            border: 1px solid #484f58;
            color: white;
            cursor: pointer;
        }

        .stack-item {
            background-color: #3b0764;
            border: 1px solid #a855f7;
            padding: 8px;
            margin: 4px;
            border-radius: 4px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="viz-area">
            <h3>二叉树变糖果串：倒着穿才不乱</h3>
            <div id="status-text">点击“下一步”开始变身</div>
            
            <div id="zoom-controls">
                <button class="zoom-btn" id="zoom-in">+</button>
                <button class="zoom-btn" id="zoom-out">-</button>
                <button class="zoom-btn" id="zoom-reset">⟲</button>
            </div>
            
            <svg id="tree-svg">
                <g id="viewport-g"></g>
            </svg>
            
            <div id="controls">
                <button id="reset-btn">重置</button>
                <button id="next-btn">下一步</button>
            </div>
        </div>
        
        <div id="sidebar">
            <div id="stack-container">
                <h3>递归栈 (Call Stack)</h3>
                <div id="stack-list"></div>
            </div>
            <div id="status-container">
                <h3>当前状态</h3>
                <div id="current-prev" style="margin-bottom: 10px;">上一个处理的 (prev): <span id="prev-val">None</span></div>
                <p style="font-size: 0.9em; color: #8b949e;">变身顺序：右 -> 左 -> 根</p>
            </div>
        </div>
    </div>

    <script>
        const treeData = {
            id: 1, val: 1,
            left: {
                id: 2, val: 2,
                left: { id: 3, val: 3, left: null, right: null },
                right: { id: 4, val: 4, left: null, right: null }
            },
            right: {
                id: 5, val: 5,
                left: null,
                right: { id: 6, val: 6, left: null, right: null }
            }
        };

        let nodes = [];
        let links = [];
        let steps = [];
        let currentStep = 0;
        let prevNode = null;
        let scale = 1;

        // 生成递归步骤
        function generateSteps(node) {
            if (!node) return;
            generateSteps(node.right);
            generateSteps(node.left);
            steps.push(node);
        }

        function flatten(node, x, y, dx) {
            if (!node) return;
            node.originalX = x; node.originalY = y;
            node.x = x; node.y = y;
            nodes.push(node);
            if (node.left) {
                links.push({ source: node, target: node.left, type: 'left' });
                flatten(node.left, x - dx, y + 80, dx * 0.5);
            }
            if (node.right) {
                links.push({ source: node, target: node.right, type: 'right' });
                flatten(node.right, x + dx, y + 80, dx * 0.5);
            }
        }

        const svg = document.getElementById('tree-svg');
        const viewportG = document.getElementById('viewport-g');
        const stackList = document.getElementById('stack-list');
        const prevValSpan = document.getElementById('prev-val');
        const statusText = document.getElementById('status-text');
        const nextBtn = document.getElementById('next-btn');

        function init() {
            nodes = []; links = []; steps = []; currentStep = 0; prevNode = null;
            flatten(treeData, 400, 50, 150);
            generateSteps(treeData);
            updateViewBox();
            statusText.innerText = "准备好，我们要按照 右 -> 左 -> 根 的顺序倒着处理";
            prevValSpan.innerText = "None";
            nextBtn.disabled = false;
            render();
        }

        function updateViewBox() {
            if (nodes.length === 0) return;
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            nodes.forEach(n => {
                minX = Math.min(minX, n.x); maxX = Math.max(maxX, n.x);
                minY = Math.min(minY, n.y); maxY = Math.max(maxY, n.y);
            });
            const padding = 60;
            const width = maxX - minX + padding * 2;
            const height = maxY - minY + padding * 2;
            svg.setAttribute('viewBox', `${minX - padding} ${minY - padding} ${width} ${height}`);
        }

        function render() {
            viewportG.innerHTML = '';
            
            // Render links
            links.forEach(l => {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', l.source.x); line.setAttribute('y1', l.source.y);
                line.setAttribute('x2', l.target.x); line.setAttribute('y2', l.target.y);
                let className = 'link';
                if (l.hidden) className += ' hidden';
                if (l.newLink) className += ' new-link';
                line.setAttribute('class', className);
                viewportG.appendChild(line);
            });

            // Render nodes
            nodes.forEach(n => {
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                let className = 'node';
                if (n.active) className += ' active';
                if (n.flattened) className += ' flattened';
                
                g.setAttribute('class', className);
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', n.x); circle.setAttribute('cy', n.y); circle.setAttribute('r', 20);
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', n.x); text.setAttribute('y', n.y); text.textContent = n.val;
                g.appendChild(circle); g.appendChild(text); viewportG.appendChild(g);
            });
        }

        nextBtn.onclick = () => {
            if (currentStep >= steps.length) return;

            // Clear previous active
            nodes.forEach(n => n.active = false);

            const node = steps[currentStep];
            node.active = true;
            node.flattened = true;

            statusText.innerText = `处理节点 ${node.val}：断开左枝，连向右边的 ${prevNode ? prevNode.val : 'None'}`;

            // 断开原来的连接
            links.forEach(l => {
                if (l.source === node) {
                    l.hidden = true;
                }
            });

            // 建立新连接并移动位置
            if (prevNode) {
                links.push({ source: node, target: prevNode, newLink: true });
                // 模拟链表位置移动
                node.x = 400;
                node.y = 50 + (steps.length - 1 - currentStep) * 60;
                // 让 prevNode 以及它连着的所有人都往下移
                let temp = prevNode;
                let depth = 1;
                while(temp) {
                   temp.x = 400;
                   temp.y = node.y + depth * 60;
                   temp = steps.find(s => links.find(l => l.source === temp && l.target === s && l.newLink));
                   depth++;
                }
            } else {
                node.x = 400;
                node.y = 50 + (steps.length - 1) * 60;
            }

            prevNode = node;
            prevValSpan.innerText = node.val;
            currentStep++;

            if (currentStep === steps.length) {
                statusText.innerText = "大功告成！二叉树变成了一串糖果！";
                nextBtn.disabled = true;
            }
            
            updateViewBox();
            render();
        };

        // Zoom logic
        document.getElementById('zoom-in').onclick = () => { scale *= 1.2; viewportG.setAttribute('transform', `scale(${scale})`); };
        document.getElementById('zoom-out').onclick = () => { scale /= 1.2; viewportG.setAttribute('transform', `scale(${scale})`); };
        document.getElementById('zoom-reset').onclick = () => { scale = 1; viewportG.setAttribute('transform', `scale(1)`); };

        document.getElementById('reset-btn').onclick = init;
        init();
    </script>
</body>
</html>
