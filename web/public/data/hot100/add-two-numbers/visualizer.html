<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(20, 20, 23, 0.8);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-violet: #a78bfa;
            --primary-rose: #fb7185;
            --primary-emerald: #10b981;
            --primary-amber: #fbbf24;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); margin: 0; color: #fff; height: 100vh;
            display: flex; align-items: center; justify-content: center; overflow-y: auto;
        }

        .container { width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 40px 20px; }
        
        .status-card { 
            background: var(--card-bg); border: 1px solid var(--border-color); backdrop-blur: 12px;
            padding: 16px 24px; border-radius: 24px; width: 100%; max-width: 600px; 
            text-align: center; min-height: 80px; display: flex; align-items: center; justify-content: center;
        }
        .status-text { font-size: 0.95rem; color: #d1d1d6; line-height: 1.6; }
        .highlight { font-weight: 800; color: var(--primary-violet); }

        .math-area { display: flex; flex-direction: column; gap: 20px; margin-top: 20px; width: 100%; align-items: center; }
        .list-row { display: flex; gap: 15px; align-items: center; min-height: 60px; }
        .row-label { width: 80px; font-size: 0.7rem; color: #71717a; font-weight: 900; text-transform: uppercase; }
        
        .node {
            width: 45px; height: 45px; border: 1.5px solid #333; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.1rem; background: #111; transition: all 0.4s;
        }
        .node.active { border-color: var(--primary-violet); background: rgba(167, 139, 250, 0.15); transform: scale(1.1); box-shadow: 0 0 15px rgba(167, 139, 250, 0.3); }
        .node.result { border-color: var(--primary-emerald); color: var(--primary-emerald); }

        .carry-box { background: rgba(251, 191, 36, 0.1); border: 1px solid var(--primary-amber); color: var(--primary-amber); padding: 4px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; }

        .controls { display: flex; gap: 16px; margin-top: 20px; }
        button { padding: 12px 32px; border-radius: 16px; border: 1px solid var(--border-color); background: #1c1c1e; color: #fff; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; }
        button:hover:not(:disabled) { background: #2c2c2e; transform: translateY(-2px); }
        button:disabled { opacity: 0.2; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-card">
            <div id="status" class="status-text">准备开始！我们将一位一位地相加。</div>
        </div>

        <div class="math-area">
            <div class="list-row"><div class="row-label">L1 (2-4-3)</div><div id="row-1" style="display:flex;gap:10px"></div></div>
            <div class="list-row"><div class="row-label">L2 (5-6-4)</div><div id="row-2" style="display:flex;gap:10px"></div></div>
            <div id="carry-display" class="carry-box" style="opacity:0">进位 Carry: 0</div>
            <div class="list-row" style="border-top: 1px solid #333; padding-top: 20px;"><div class="row-label">结果 Result</div><div id="row-ans" style="display:flex;gap:10px"></div></div>
        </div>

        <div class="controls">
            <button onclick="reset()">重置</button>
            <button onclick="nextStep()" id="next-btn">下一步</button>
        </div>
    </div>

    <script>
        const l1 = [2, 4, 3];
        const l2 = [5, 6, 4];
        let idx = 0;
        let carry = 0;
        const res = [];

        function init() {
            const r1 = document.getElementById('row-1');
            const r2 = document.getElementById('row-2');
            r1.innerHTML = ''; r2.innerHTML = '';
            l1.forEach((v, i) => r1.innerHTML += `<div class="node" id="l1-${i}">${v}</div>`);
            l2.forEach((v, i) => r2.innerHTML += `<div class="node" id="l2-${i}">${v}</div>`);
            document.getElementById('row-ans').innerHTML = '';
            document.getElementById('carry-display').style.opacity = 0;
            document.getElementById('next-btn').disabled = false;
        }

        function nextStep() {
            const status = document.getElementById('status');
            
            if (idx >= Math.max(l1.length, l2.length) && carry === 0) {
                status.innerHTML = `🎉 计算完成！新链表已经拼接好了。`;
                document.getElementById('next-btn').disabled = true;
                return;
            }

            const v1 = l1[idx] || 0;
            const v2 = l2[idx] || 0;
            
            // Highlight current nodes
            document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
            if (idx < l1.length) document.getElementById(`l1-${idx}`).classList.add('active');
            if (idx < l2.length) document.getElementById(`l2-${idx}`).classList.add('active');

            const sum = v1 + v2 + carry;
            const newVal = sum % 10;
            const newCarry = Math.floor(sum / 10);

            status.innerHTML = `计算第 ${idx+1} 位：${v1} + ${v2} + (进位${carry}) = <span class="highlight">${sum}</span>。<br>当前位存入 <span style="color:var(--primary-emerald)">${newVal}</span>，产生新进位 <span style="color:var(--primary-amber)">${newCarry}</span>。`;
            
            res.push(newVal);
            const ansRow = document.getElementById('row-ans');
            const node = document.createElement('div');
            node.className = 'node result';
            node.innerText = newVal;
            ansRow.appendChild(node);

            carry = newCarry;
            const carryEl = document.getElementById('carry-display');
            carryEl.innerText = `进位 Carry: ${carry}`;
            carryEl.style.opacity = carry > 0 ? 1 : 0.3;

            idx++;
        }

        function reset() {
            idx = 0; carry = 0; res.length = 0;
            document.getElementById('status').innerText = "已重置，准备开始。";
            init();
        }

        init();
    </script>
</body>
</html>
