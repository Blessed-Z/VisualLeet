<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(20, 20, 23, 0.8);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-violet: #a78bfa;
            --primary-rose: #fb7185;
            --primary-emerald: #10b981;
            --primary-amber: #fbbf24;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); margin: 0; color: #fff; height: 100vh;
            display: flex; align-items: center; justify-content: center; overflow-y: auto;
        }

        .container { width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 40px 20px; }
        
        .status-card { 
            background: var(--card-bg); border: 1px solid var(--border-color); backdrop-blur: 12px;
            padding: 16px 24px; border-radius: 24px; width: 100%; max-width: 600px; 
            text-align: center; min-height: 80px; display: flex; align-items: center; justify-content: center;
        }
        .status-text { font-size: 0.95rem; color: #d1d1d6; line-height: 1.6; }
        .highlight { font-weight: 800; color: var(--primary-violet); }

        .timeline { 
            position: relative; width: 100%; height: 250px; margin-top: 20px;
            border-bottom: 2px solid #333; display: flex; flex-direction: column; justify-content: flex-end;
        }
        .axis-marker { position: absolute; bottom: -25px; font-size: 0.7rem; color: #71717a; font-mono; }

        .interval-bar {
            position: absolute; height: 30px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .bar-input { background: rgba(255,255,255,0.05); color: #71717a; border-style: dashed; }
        .bar-merged { background: linear-gradient(90deg, var(--primary-violet), #7c3aed); color: #fff; box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); z-index: 20; }
        .bar-active { border-color: var(--primary-amber); transform: scaleY(1.1); z-index: 30; }

        .controls { display: flex; gap: 16px; margin-top: 20px; }
        button { padding: 12px 32px; border-radius: 16px; border: 1px solid var(--border-color); background: #1c1c1e; color: #fff; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; }
        button:hover:not(:disabled) { background: #2c2c2e; transform: translateY(-2px); }
        button:disabled { opacity: 0.2; cursor: not-allowed; }

        .legend { display: flex; gap: 20px; font-size: 0.7rem; color: #71717a; margin-top: 10px; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .dot { width: 8px; height: 8px; border-radius: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-card">
            <div id="status" class="status-text">准备开始！我们要合并这些乱糟糟的铁轨段。</div>
        </div>

        <div class="timeline" id="timeline">
            <!-- Markers and Bars will be here -->
        </div>

        <div class="legend">
            <div class="legend-item"><div class="dot" style="background: rgba(255,255,255,0.1); border: 1px dashed #444;"></div> 待处理</div>
            <div class="legend-item"><div class="dot" style="background: var(--primary-violet);"></div> 已合并/处理</div>
            <div class="legend-item"><div class="dot" style="border: 1px solid var(--primary-amber);"></div> 当前选中</div>
        </div>

        <div class="controls">
            <button onclick="reset()">重置</button>
            <button onclick="nextStep()" id="next-btn">下一步</button>
        </div>
    </div>

    <script>
        const originalIntervals = [[1, 3], [8, 10], [2, 6], [15, 18]];
        let intervals = [...originalIntervals];
        let ans = [];
        let step = 0; // 0: sorting, 1+: iterating
        let isSorted = false;

        const SCALE = 35;
        const OFFSET_X = 40;

        function init() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';
            
            // Draw axis markers
            for(let i=0; i<=20; i+=2) {
                const marker = document.createElement('div');
                marker.className = 'axis-marker';
                marker.innerText = i;
                marker.style.left = `${OFFSET_X + i * SCALE}px`;
                timeline.appendChild(marker);
            }

            // Draw initial intervals
            renderIntervals();
            document.getElementById('next-btn').disabled = false;
        }

        function renderIntervals() {
            const timeline = document.getElementById('timeline');
            // Clear existing bars
            timeline.querySelectorAll('.interval-bar').forEach(b => b.remove());

            // Render current ans (merged)
            ans.forEach((int, idx) => {
                const bar = createBar(int, 'bar-merged');
                bar.style.bottom = '80px';
                timeline.appendChild(bar);
            });

            // Render remaining intervals
            intervals.forEach((int, idx) => {
                const bar = createBar(int, 'bar-input');
                bar.style.bottom = `${20 + idx * 40}px`;
                if (!isSorted) bar.style.opacity = '0.6';
                if (step > 0 && idx === 0) bar.classList.add('bar-active');
                timeline.appendChild(bar);
            });
        }

        function createBar(int, className) {
            const div = document.createElement('div');
            div.className = `interval-bar ${className}`;
            div.style.left = `${OFFSET_X + int[0] * SCALE}px`;
            div.style.width = `${(int[1] - int[0]) * SCALE}px`;
            div.innerText = `[${int[0]}, ${int[1]}]`;
            return div;
        }

        function nextStep() {
            const status = document.getElementById('status');

            if (!isSorted) {
                intervals.sort((a, b) => a[0] - b[0]);
                isSorted = true;
                status.innerHTML = `第一步：先按开始位置<span class="highlight">排序</span>。看！铁轨现在整齐多了。`;
                renderIntervals();
                return;
            }

            if (intervals.length === 0) {
                status.innerHTML = `🎉 所有铁轨都处理完啦！最终合并结果在紫色区域。`;
                document.getElementById('next-btn').disabled = true;
                return;
            }

            const current = intervals.shift();
            
            if (ans.length === 0 || ans[ans.length - 1][1] < current[0]) {
                ans.push([...current]);
                status.innerHTML = `拿起铁轨 <span class="highlight">[${current[0]}, ${current[1]}]</span>。<br>它和前面的接不上，作为一段新的独立铁轨。`;
            } else {
                const prev = ans[ans.length - 1];
                const oldEnd = prev[1];
                prev[1] = Math.max(prev[1], current[1]);
                status.innerHTML = `拿起铁轨 <span class="highlight">[${current[0]}, ${current[1]}]</span>。<br>它和前面的重叠了！融合在一起，新终点：max(${oldEnd}, ${current[1]}) = <span class="highlight">${prev[1]}</span>。`;
            }

            renderIntervals();
        }

        function reset() {
            intervals = [[1, 3], [8, 10], [2, 6], [15, 18]];
            ans = [];
            step = 0;
            isSorted = false;
            document.getElementById('status').innerText = "已重置，准备开始。";
            init();
        }

        init();
    </script>
</body>
</html>
