<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #09090b; margin: 0; padding: 20px; color: #fff; overflow-x: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 30px; }
        
        .list-row { display: flex; align-items: center; gap: 10px; min-height: 80px; }
        .node { width: 45px; height: 45px; border: 2px solid #3f3f46; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; background: #18181b; transition: all 0.4s; position: relative; }
        .arrow { color: #52525b; font-size: 1.2rem; }
        
        .is-l { border-color: #a78bfa; background: rgba(167, 139, 250, 0.1); } /* Purple */
        .is-r { border-color: #fb7185; background: rgba(251, 113, 133, 0.1); } /* Rose */
        .is-merged { border-color: #10b981; background: rgba(16, 185, 129, 0.1); } /* Emerald */
        .is-current { border-color: #fbbf24; box-shadow: 0 0 15px rgba(251, 191, 36, 0.4); } /* Amber */

        .label { position: absolute; top: -25px; font-size: 0.6rem; font-weight: bold; text-transform: uppercase; white-space: nowrap; }
        
        .status-card { background: #18181b; border: 1px solid #27272a; padding: 15px 25px; border-radius: 20px; width: 100%; max-width: 600px; text-align: center; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .status-text { font-size: 0.9rem; color: #a1a1aa; line-height: 1.6; }

        .controls { display: flex; gap: 12px; margin-top: 10px; }
        button { padding: 10px 28px; border-radius: 14px; border: 1px solid #27272a; background: #18181b; color: #e4e4e7; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
        button:hover { background: #27272a; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        .section-title { font-size: 0.7rem; color: #71717a; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
        .list-container { display: flex; flex-direction: column; align-items: flex-start; gap: 5px; background: rgba(24, 24, 27, 0.5); padding: 15px; border-radius: 15px; border: 1px solid #27272a; }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-card">
            <div id="status" class="status-text">准备合并两个有序链表：[2, 4] 和 [1, 3]</div>
        </div>

        <div class="list-container">
            <div class="section-title">左小队 (已排序)</div>
            <div class="list-row" id="list-l"></div>
        </div>

        <div class="list-container">
            <div class="section-title">右小队 (已排序)</div>
            <div class="list-row" id="list-r"></div>
        </div>

        <div class="list-container">
            <div class="section-title">合并后的新队伍</div>
            <div class="list-row" id="list-merged"></div>
        </div>

        <div class="controls">
            <button onclick="reset()">重置</button>
            <button onclick="nextStep()" id="next-btn">下一步</button>
        </div>
    </div>

    <script>
        const leftNodes = [2, 4];
        const rightNodes = [1, 3];
        let lIdx = 0;
        let rIdx = 0;
        let merged = [];
        let step = 0;

        function init() {
            renderList('list-l', leftNodes, 'l', lIdx);
            renderList('list-r', rightNodes, 'r', rIdx);
            renderList('list-merged', merged, 'm', -1);
            document.getElementById('next-btn').disabled = false;
        }

        function renderList(containerId, data, prefix, currentIdx) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            data.forEach((val, idx) => {
                const node = document.createElement('div');
                node.className = 'node';
                if (prefix === 'l') node.classList.add('is-l');
                if (prefix === 'r') node.classList.add('is-r');
                if (prefix === 'm') node.classList.add('is-merged');
                
                if (idx === currentIdx) {
                    node.classList.add('is-current');
                    const label = document.createElement('span');
                    label.className = 'label';
                    label.innerText = '当前比较';
                    label.style.color = '#fbbf24';
                    node.appendChild(label);
                }
                
                const valSpan = document.createElement('span');
                valSpan.innerText = val;
                node.appendChild(valSpan);
                container.appendChild(node);

                if (idx < data.length - 1 || (containerId === 'list-merged' && data.length > 0)) {
                    const arrow = document.createElement('div');
                    arrow.className = 'arrow';
                    arrow.innerHTML = '→';
                    container.appendChild(arrow);
                }
            });
            if (data.length === 0 && containerId === 'list-merged') {
                container.innerHTML = '<span style="color:#3f3f46; font-size:0.8rem">等待合并...</span>';
            }
        }

        function nextStep() {
            const status = document.getElementById('status');
            
            if (lIdx >= leftNodes.length && rIdx >= rightNodes.length) {
                status.innerHTML = "🎉 合并完成！链表已变得井然有序。";
                document.getElementById('next-btn').disabled = true;
                return;
            }

            let winner;
            if (lIdx < leftNodes.length && (rIdx >= rightNodes.length || leftNodes[lIdx] <= rightNodes[rIdx])) {
                winner = leftNodes[lIdx];
                status.innerHTML = `比较 <span style="color:#a78bfa">${leftNodes[lIdx]}</span> 和 <span style="color:#fb7185">${rIdx < rightNodes.length ? rightNodes[rIdx] : '空'}</span>：<br><span style="color:#a78bfa">${leftNodes[lIdx]}</span> 更小（或右边已空），加入新队伍。`;
                lIdx++;
            } else {
                winner = rightNodes[rIdx];
                status.innerHTML = `比较 <span style="color:#a78bfa">${lIdx < leftNodes.length ? leftNodes[lIdx] : '空'}</span> 和 <span style="color:#fb7185">${rightNodes[rIdx]}</span>：<br><span style="color:#fb7185">${rightNodes[rIdx]}</span> 更小（或左边已空），加入新队伍。`;
                rIdx++;
            }
            
            merged.push(winner);
            renderList('list-l', leftNodes, 'l', lIdx < leftNodes.length ? lIdx : -1);
            renderList('list-r', rightNodes, 'r', rIdx < rightNodes.length ? rIdx : -1);
            renderList('list-merged', merged, 'm', -1);
        }

        function reset() {
            lIdx = 0; rIdx = 0; merged = [];
            document.getElementById('status').innerText = "已重置，准备合并。";
            init();
        }

        init();
    </script>
</body>
</html>
