<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二叉树中序遍历可视化</title>
    <style>
        body {
            background-color: #0d1117;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto;
        }
        #container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 20px;
            flex-wrap: wrap;
        }
        #viz-area {
            flex: 2;
            min-width: 600px;
            height: 500px;
            background-color: #161b22;
            border-radius: 12px;
            padding: 20px;
            position: relative;
            border: 1px solid #30363d;
            display: flex;
            flex-direction: column;
        }
        .zoom-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(13, 17, 23, 0.8);
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #30363d;
            z-index: 100;
        }
        .zoom-btn {
            width: 36px;
            height: 36px;
            padding: 0 !important;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: #161b22 !important;
            color: #10b981 !important;
            border: 1px solid #30363d !important;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .zoom-btn:hover {
            background: #30363d !important;
            color: #a855f7 !important;
            border-color: #a855f7 !important;
        }
        #sidebar {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        #stack-container, #result-container {
            background-color: #161b22;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            border: 1px solid #30363d;
        }
        #stack-container { flex: 2; }
        #result-container { flex: 1; }
        
        h3 { margin-top: 0; color: #a855f7; }
        
        .stack-item {
            background-color: #3b0764;
            border: 1px solid #a855f7;
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 4px;
            text-align: center;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        #tree-svg {
            width: 100%;
            height: 100%;
            flex-grow: 1;
        }
        
        .node circle {
            fill: #1e293b;
            stroke: #475569;
            stroke-width: 2px;
            transition: all 0.3s;
        }
        
        .node text {
            fill: #e2e8f0;
            font-size: 14px;
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none;
        }
        
        .node.active circle {
            stroke: #f43f5e;
            stroke-width: 4px;
            fill: #4c0519;
        }
        
        .node.visited circle {
            fill: #064e3b;
            stroke: #10b981;
        }
        
        .node.in-stack circle {
            fill: #3b0764;
            stroke: #a855f7;
        }
        
        .link {
            stroke: #475569;
            stroke-width: 2px;
            fill: none;
        }
        
        #controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }
        
        button {
            background-color: #a855f7;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        
        button:hover { background-color: #9333ea; }
        button:disabled { background-color: #30363d; color: #8b949e; cursor: not-allowed; }
        
        #status-text {
            margin-top: 10px;
            font-size: 1.1em;
            color: #f43f5e;
            min-height: 1.5em;
            text-align: center;
        }
        
        .res-item {
            display: inline-block;
            background-color: #064e3b;
            color: #10b981;
            padding: 4px 10px;
            margin: 2px;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="viz-area">
            <h3>二叉树结构</h3>
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="changeZoom(0.1)" title="放大">+</button>
                <button class="zoom-btn" onclick="changeZoom(-0.1)" title="缩小">-</button>
                <button class="zoom-btn" onclick="resetZoom()" title="重置">⟲</button>
            </div>
            <div id="status-text">点击“下一步”开始遍历</div>
            <svg id="tree-svg"></svg>
            <div id="controls">
                <button id="reset-btn">重置</button>
                <button id="next-btn">下一步</button>
            </div>
        </div>
        <div id="sidebar">
            <div id="stack-container">
                <h3>暂存栈 (Stack)</h3>
                <div id="stack-list" style="display: flex; flex-direction: column-reverse; overflow-y: auto;"></div>
            </div>
            <div id="result-container">
                <h3>遍历结果 (Result)</h3>
                <div id="result-list" style="overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script>
        const treeData = {
            val: 1,
            left: {
                val: 2,
                left: { val: 4, left: null, right: null },
                right: { val: 5, left: null, right: null }
            },
            right: {
                val: 3,
                left: null,
                right: { val: 6, left: null, right: null }
            }
        };

        let nodes = [];
        let links = [];
        let stack = [];
        let result = [];
        let curr = treeData;
        let finished = false;

        function flatten(node, x, y, dx) {
            if (!node) return;
            node.x = x;
            node.y = y;
            nodes.push(node);
            if (node.left) {
                links.push({ source: node, target: node.left });
                flatten(node.left, x - dx, y + 80, dx / 2);
            }
            if (node.right) {
                links.push({ source: node, target: node.right });
                flatten(node.right, x + dx, y + 80, dx / 2);
            }
        }

        const svg = document.getElementById('tree-svg');
        const stackList = document.getElementById('stack-list');
        const resultList = document.getElementById('result-list');
        const statusText = document.getElementById('status-text');
        const nextBtn = document.getElementById('next-btn');
        const resetBtn = document.getElementById('reset-btn');

        let zoomFactor = 1.0;

        function changeZoom(delta) {
            zoomFactor = Math.max(0.2, Math.min(5.0, zoomFactor + delta));
            render();
        }

        function resetZoom() {
            zoomFactor = 1.0;
            render();
        }

        function init() {
            nodes = [];
            links = [];
            stack = [];
            result = [];
            curr = treeData;
            finished = false;
            statusText.innerText = "准备开始：小蜗牛在根节点 1";
            nextBtn.disabled = false;
            flatten(treeData, 400, 50, 150);
            render();
        }

        function render() {
            svg.innerHTML = '';
            
            if (nodes.length > 0) {
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                nodes.forEach(n => {
                    minX = Math.min(minX, n.x);
                    maxX = Math.max(maxX, n.x);
                    minY = Math.min(minY, n.y);
                    maxY = Math.max(maxY, n.y);
                });
                
                const padding = 40;
                const zoomW = (maxX - minX + padding * 2) / zoomFactor;
                const zoomH = (maxY - minY + padding * 2) / zoomFactor;
                const centerX = (minX + maxX) / 2;
                const centerY = (minY + maxY) / 2;
                svg.setAttribute('viewBox', `${centerX - zoomW / 2} ${centerY - zoomH / 2} ${zoomW} ${zoomH}`);
            }

            // Links
            links.forEach(l => {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', l.source.x);
                line.setAttribute('y1', l.source.y);
                line.setAttribute('x2', l.target.x);
                line.setAttribute('y2', l.target.y);
                line.setAttribute('class', 'link');
                svg.appendChild(line);
            });
            // Nodes
            nodes.forEach(n => {
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                let className = 'node';
                if (n === curr) className += ' active';
                if (stack.includes(n)) className += ' in-stack';
                if (result.includes(n.val)) className += ' visited';
                g.setAttribute('class', className);
                
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', n.x);
                circle.setAttribute('cy', n.y);
                circle.setAttribute('r', 20);
                
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', n.x);
                text.setAttribute('y', n.y);
                text.textContent = n.val;
                
                g.appendChild(circle);
                g.appendChild(text);
                svg.appendChild(g);
            });

            // Stack
            stackList.innerHTML = '';
            stack.forEach(n => {
                const div = document.createElement('div');
                div.className = 'stack-item';
                div.innerText = n.val;
                stackList.appendChild(div);
            });

            // Result
            resultList.innerHTML = '';
            result.forEach(v => {
                const span = document.createElement('span');
                span.className = 'res-item';
                span.innerText = v;
                resultList.appendChild(span);
            });
        }

        let state = 'DOWN_LEFT'; // DOWN_LEFT, POP_AND_VISIT, MOVE_RIGHT

        nextBtn.onclick = () => {
            if (finished) return;

            if (state === 'DOWN_LEFT') {
                if (curr) {
                    statusText.innerText = `向左走到底：将节点 ${curr.val} 压入栈中`;
                    stack.push(curr);
                    curr = curr.left;
                } else {
                    state = 'POP_AND_VISIT';
                    statusText.innerText = "左边没路了，准备从栈中取出节点";
                    nextBtn.click();
                }
            } else if (state === 'POP_AND_VISIT') {
                if (stack.length > 0) {
                    curr = stack.pop();
                    result.push(curr.val);
                    statusText.innerText = `出栈并记录：吃掉节点 ${curr.val} 的能量豆`;
                    state = 'MOVE_RIGHT';
                } else {
                    finished = true;
                    statusText.innerText = "遍历完成！";
                    nextBtn.disabled = true;
                    curr = null;
                }
            } else if (state === 'MOVE_RIGHT') {
                statusText.innerText = `向右转：尝试进入节点 ${curr.val} 的右子树`;
                curr = curr.right;
                state = 'DOWN_LEFT';
            }
            render();
        };

        resetBtn.onclick = init;

        init();
    </script>
</body>
</html>
