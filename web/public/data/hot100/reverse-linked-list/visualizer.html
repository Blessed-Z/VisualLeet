<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(20, 20, 23, 0.8);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-violet: #a78bfa;
            --primary-emerald: #10b981;
            --primary-rose: #fb7185;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); margin: 0; color: #fff; height: 100vh;
            display: flex; align-items: center; justify-content: center; overflow-y: auto;
        }

        .container { width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center; gap: 32px; padding: 40px 20px; }
        
        .status-card { 
            background: var(--card-bg); border: 1px solid var(--border-color); backdrop-blur: 12px;
            padding: 16px 24px; border-radius: 24px; width: 100%; max-width: 600px; 
            text-align: center; min-height: 80px; display: flex; align-items: center; justify-content: center;
        }
        .status-text { font-size: 0.95rem; color: #d1d1d6; line-height: 1.6; }
        .highlight { font-weight: 800; color: var(--primary-violet); }

        .list-area { display: flex; gap: 40px; justify-content: center; margin-top: 40px; position: relative; }
        
        .node-wrapper { display: flex; align-items: center; gap: 10px; position: relative; }
        .node {
            width: 50px; height: 50px; background: #111; border: 2px solid #333;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.1rem; transition: all 0.5s;
        }
        .arrow { font-size: 1.5rem; color: #444; transition: all 0.5s; }
        .arrow.reversed { transform: rotate(180deg); color: var(--primary-emerald); }
        .arrow.hidden { opacity: 0; }

        .node.active { border-color: var(--primary-violet); box-shadow: 0 0 15px var(--primary-violet); }
        .node.new-head { border-color: var(--primary-emerald); color: var(--primary-emerald); }

        .controls { display: flex; gap: 16px; margin-top: 10px; }
        button { padding: 12px 32px; border-radius: 16px; border: 1px solid var(--border-color); background: #1c1c1e; color: #fff; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; }
        button:hover:not(:disabled) { background: #2c2c2e; transform: translateY(-2px); }
        button:disabled { opacity: 0.2; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-card">
            <div id="status" class="status-text">准备开始！递归法会先找到最后一名，然后带头转身。</div>
        </div>

        <div class="list-area" id="list">
            <!-- Nodes injected -->
        </div>

        <div class="controls">
            <button onclick="reset()">重置</button>
            <button onclick="nextStep()" id="next-btn">下一步</button>
        </div>
    </div>

    <script>
        const vals = [1, 2, 3, 4, 5];
        let step = 0; 
        // steps: 
        // 0-4: finding tail (recursion deep)
        // 5-8: reversing (returning from recursion)

        function init() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            vals.forEach((v, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'node-wrapper';
                wrapper.innerHTML = `
                    <div class="node" id="node-${i}">${v}</div>
                    ${i < vals.length - 1 ? `<div class="arrow" id="arrow-${i}">→</div>` : ''}
                `;
                list.appendChild(wrapper);
            });
            document.getElementById('next-btn').disabled = false;
        }

        function nextStep() {
            const status = document.getElementById('status');
            
            if (step < vals.length - 1) {
                // Moving forward
                document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
                document.getElementById(`node-${step}`).classList.add('active');
                status.innerHTML = `正在递归寻找末尾：当前节点是 <span class="highlight">${vals[step]}</span>...`;
                step++;
            } else if (step === vals.length - 1) {
                // At tail
                document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
                const tail = document.getElementById(`node-${vals.length-1}`);
                tail.classList.add('new-head');
                status.innerHTML = `找到了！最后一个节点 <span class="highlight">${vals[vals.length-1]}</span> 是反转后的<span style="color:var(--primary-emerald)">新头</span>。`;
                step++;
            } else {
                // Reversing
                const currentIdx = vals.length - (step - (vals.length - 1)) - 1;
                if (currentIdx < 0) {
                    status.innerHTML = `🎉 反转全部完成！新的链表顺序已建立。`;
                    document.getElementById('next-btn').disabled = true;
                    return;
                }
                
                const node = document.getElementById(`node-${currentIdx}`);
                const arrow = document.getElementById(`arrow-${currentIdx}`);
                
                if (arrow) {
                    arrow.classList.add('reversed');
                    status.innerHTML = `回溯到节点 <span class="highlight">${vals[currentIdx]}</span>：让我的邻居指向我，然后我指向空。`;
                }
                step++;
            }
        }

        function reset() {
            step = 0;
            document.getElementById('status').innerText = "已重置，准备开始。";
            init();
        }

        init();
    </script>
</body>
</html>
