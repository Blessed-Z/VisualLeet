<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>74. 搜索二维矩阵 可视化</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --primary-purple: #9d4edd;
            --rose-red: #ff006e;
            --emerald-green: #06d6a0;
            --amber: #ffbe0b;
            --text-color: #e6edf3;
            --node-bg: #161b22;
        }

        html, body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow-x: hidden; overflow-y: auto;
        }

        body { display: flex; flex-direction: column; align-items: center; padding: 40px 0; }

        .container {
            width: 95%; max-width: 1000px;
            display: flex; flex-direction: column; gap: 20px; padding-bottom: 100px;
        }

        .status-box {
            background-color: var(--node-bg); padding: 20px; border-radius: 12px;
            border-left: 5px solid var(--primary-purple); min-height: 80px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 1.1em; box-shadow: 0 4px 15px rgba(0,0,0,0.3); line-height: 1.6;
        }

        .visualization-area {
            position: relative; border: 1px solid #30363d; border-radius: 20px;
            background: #1c2128; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; overflow: hidden;
            min-height: 450px;
        }

        .grid {
            display: grid;
            gap: 10px;
            transition: all 0.3s;
        }

        .cell {
            width: 60px; height: 60px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.2em; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 2px solid #30363d;
            background-color: var(--node-bg); color: #8b949e;
        }

        .cell.active { border-color: var(--amber); transform: scale(1.1); z-index: 10; box-shadow: 0 0 15px var(--amber); color: var(--amber); }
        .cell.discarded { opacity: 0.15; transform: scale(0.9); }
        .cell.target-found { background-color: rgba(6, 214, 160, 0.2); border-color: var(--emerald-green); color: var(--emerald-green); box-shadow: 0 0 20px var(--emerald-green); transform: scale(1.15); }

        .zoom-controls { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 100; }
        .zoom-btn {
            width: 35px; height: 35px; border-radius: 8px; background: rgba(22, 27, 34, 0.8);
            border: 1px solid #30363d; color: var(--text-color); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-weight: bold; backdrop-blur: 4px;
        }
        .zoom-btn:hover { background: #30363d; }

        .controls { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        button {
            padding: 12px 35px; border-radius: 35px; border: none; cursor: pointer;
            font-weight: bold; transition: all 0.3s; font-size: 1.1em; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .btn-next { background-color: var(--emerald-green); color: #000; }
        .btn-reset { background-color: #30363d; color: var(--text-color); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        .highlight-text { font-weight: bold; padding: 0 4px; border-radius: 4px; }
        
        .pointer-tag {
            position: absolute; top: -25px; font-size: 0.6em; background: var(--amber); color: black;
            padding: 2px 6px; border-radius: 4px; font-weight: 800; text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏰 搜索二维矩阵</h1>
        <div class="status-box">
            <div id="status">准备进入城堡！目标值: <span class="amber highlight-text">34</span></div>
            <div id="sub-status" style="font-size: 0.85em; color: #8b949e; margin-top: 8px;">我们将从右上角出发，利用“楼梯搜索法”寻找目标。</div>
        </div>

        <div class="visualization-area" id="viz">
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="changeZoom(1.1)">+</button>
                <button class="zoom-btn" onclick="changeZoom(0.9)">-</button>
                <button class="zoom-btn" onclick="resetZoom()">⟲</button>
            </div>
            <div class="grid" id="grid-container"></div>
        </div>

        <div class="controls">
            <button class="btn-reset" onclick="reset()">重置</button>
            <button class="btn-next" id="next-btn" onclick="nextStep()">下一步</button>
        </div>
    </div>

    <script>
        const matrix = [
            [1, 3, 5, 7],
            [10, 11, 16, 20],
            [23, 30, 34, 60]
        ];
        const target = 34;
        
        let i = 0;
        let j = matrix[0].length - 1;
        let steps = [];
        let currentStep = 0;
        let zoomFactor = 1.0;

        function generateSteps() {
            steps = [];
            let curI = 0;
            let curJ = matrix[0].length - 1;
            let discarded = new Set();

            while (curI < matrix.length && curJ >= 0) {
                steps.push({ i: curI, j: curJ, discarded: new Set(discarded), status: 'COMPARING' });
                
                if (matrix[curI][curJ] === target) {
                    steps.push({ i: curI, j: curJ, discarded: new Set(discarded), status: 'FOUND' });
                    return;
                }
                
                if (matrix[curI][curJ] < target) {
                    // Discard this row's left side
                    for(let col=0; col<=curJ; col++) discarded.add(`${curI}-${col}`);
                    curI++;
                } else {
                    // Discard this column's bottom side
                    for(let row=curI; row<matrix.length; row++) discarded.add(`${row}-${curJ}`);
                    curJ--;
                }
            }
            steps.push({ i: curI, j: curJ, discarded: new Set(discarded), status: 'NOT_FOUND' });
        }

        function render() {
            const container = document.getElementById('grid-container');
            container.style.gridTemplateColumns = `repeat(${matrix[0].length}, 60px)`;
            container.style.transform = `scale(${zoomFactor})`;
            container.innerHTML = '';

            const step = steps[currentStep];
            if (!step) return;

            for (let r = 0; r < matrix.length; r++) {
                for (let c = 0; c < matrix[0].length; c++) {
                    const div = document.createElement('div');
                    div.className = 'cell';
                    if (step.discarded.has(`${r}-${c}`)) div.className += ' discarded';
                    if (step.i === r && step.j === c) {
                        div.className += (step.status === 'FOUND') ? ' target-found' : ' active';
                        const tag = document.createElement('div');
                        tag.className = 'pointer-tag';
                        tag.innerText = 'Searcher';
                        div.appendChild(tag);
                    }
                    div.innerText = matrix[r][c];
                    container.appendChild(div);
                }
            }

            const status = document.getElementById('status');
            const subStatus = document.getElementById('sub-status');

            if (step.status === 'COMPARING') {
                status.innerHTML = `正在检查坐标 <span class="amber highlight-text">(${step.i}, ${step.j})</span>，数值为 <span class="amber highlight-text">${matrix[step.i][step.j]}</span>。`;
                if (matrix[step.i][step.j] < target) {
                    subStatus.innerHTML = `${matrix[step.i][step.j]} < ${target}，目标太大，排除当前行，<span class="purple">向下挪一行 (i++)</span>。`;
                } else {
                    subStatus.innerHTML = `${matrix[step.i][step.j]} > ${target}，目标太小，排除当前列，<span class="rose">向左挪一列 (j--)</span>。`;
                }
            } else if (step.status === 'FOUND') {
                status.innerHTML = `🎉 <b>成功找到！</b>`;
                subStatus.innerHTML = `坐标 <span class="emerald highlight-text">(${step.i}, ${step.j})</span> 的数值正好就是 <span class="emerald highlight-text">${target}</span>。`;
                document.getElementById('next-btn').disabled = true;
            } else {
                status.innerHTML = `❌ <b>没找到...</b>`;
                subStatus.innerText = `已经搜遍了所有可能的角落，目标不在城堡里。`;
                document.getElementById('next-btn').disabled = true;
            }
        }

        function nextStep() {
            if (currentStep < steps.length - 1) {
                currentStep++;
                render();
            }
        }

        function changeZoom(delta) { zoomFactor *= delta; zoomFactor = Math.max(0.4, Math.min(3, zoomFactor)); render(); }
        function resetZoom() { zoomFactor = 1.0; render(); }
        function reset() { currentStep = 0; document.getElementById('next-btn').disabled = false; render(); }

        generateSteps();
        window.onload = render;
    </script>
</body>
</html>
